# Required Approval Gate for azure.ai.inspector Extension
#
# Ensures at least one designated team member approves PRs that modify
# the azure.ai.inspector extension before they can merge.
#
# Uses the shared approval script at .github/scripts/pr-approval-foundry-extensions-shared.js.
# To change the required approvers list, update the REQUIRED_APPROVERS env var below
# or modify the default list in the shared script.

name: ext-azure-ai-inspector-approval

on:
  pull_request:
    paths:
      - "cli/azd/extensions/azure.ai.inspector/**"
      - ".github/workflows/approval-ext-azure-ai-inspector.yml"
      - ".github/scripts/pr-approval-foundry-extensions-shared.js"
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read
  issues: read
  statuses: write

jobs:
  required-approval:
    name: Required Approval
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/inspector-extension-approval override'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for required team approval
        uses: actions/github-script@v9
        env:
          EXTENSION_PATH: "cli/azd/extensions/azure.ai.inspector/"
          WORKFLOW_PATH: ".github/workflows/approval-ext-azure-ai-inspector.yml"
          OVERRIDE_COMMAND: "/inspector-extension-approval override"
        with:
          script: |
            const script = require('./.github/scripts/pr-approval-foundry-extensions-shared.js');
            await script({ github, context, core });
