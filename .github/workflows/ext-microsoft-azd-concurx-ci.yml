name: ext-microsoft-azd-concurx-ci

on:
  pull_request:
    paths:
      - "cli/azd/extensions/microsoft.azd.concurx/**"
      - ".github/workflows/ext-microsoft-azd-concurx-ci.yml"
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    uses: ./.github/workflows/lint-go.yml
    with:
      working-directory: cli/azd/extensions/microsoft.azd.concurx
      go-version: "^1.25"
      golangci-lint-version: "v2.6"
