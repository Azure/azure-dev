name: ext-registry-ci

on:
  pull_request:
    paths:
      - "cli/azd/extensions/registry.json"
      - ".github/workflows/ext-registry-ci.yml"
    branches: [main]

# If two events are triggered within a short time in the same PR, cancel the run of the oldest event
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  snapshot-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli/azd
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: cli/azd/go.mod
          cache-dependency-path: |
            cli/azd/go.sum

      - name: Build azd
        run: go build .

      # Fails only when a declared dependency constraint can never be satisfied by a
      # published version (a hard registry inconsistency). Absent dependency ids and
      # other advisory findings are warnings and do not fail this step, so routine
      # extension releases are not blocked. Runs on the same trigger as registry.json.
      - name: Validate registry dependency consistency
        run: |
          if ! go test ./pkg/extensions -run '^TestRegistryFileIsValid$' -v; then
            echo "::error::registry.json has an unsatisfiable dependency: a pinned dependency version is not published in the registry."
            echo "Suggestion: publish the dependency's pinned version before updating the dependent extension. The test output above names the extension, constraint, and available versions."
            exit 1
          fi

      - name: Run FigSpec snapshot test
        id: figspec
        run: go test ./cmd -v -run TestFigSpec

      - name: Run Usage snapshot test
        id: usage
        run: go test ./cmd -v -run TestUsage

      - name: Check snapshot test results
        if: failure() && (steps.figspec.outcome == 'failure' || steps.usage.outcome == 'failure')
        run: |
          echo "::error::Snapshots may be out of date. Run the following locally to update them:"
          echo ""
          echo "  cd cli/azd"
          echo "  UPDATE_SNAPSHOTS=true go test ./cmd -run 'TestFigSpec|TestUsage'"
          exit 1
