name: scripts-ci

on:
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/workflows/scripts-ci.yml"
    # NOTE, if you're doing some testing on this workflow you're welcome to use `azd-auto-approve-simple-updates`
    # as your branch name
    branches: [main, azd-auto-approve-simple-updates]

# If two events are triggered within a short time in the same PR, cancel the run of the oldest event
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vitest:
    name: Run test suite for our GitHub action support scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: .github/scripts
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
