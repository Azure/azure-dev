# cspell settings for miscellaneous files thats are not covered by other projects.
# cspell root should be specified as the top-level repository directory.

# Use global config
import: cspell.global.yaml

ignorePaths:
    # Project changes here should be kept in-sync workflow cspell-misc.yml
    - cli # uses its own cspell config
    - ext/vscode # uses its own cspell config
    - ext/devcontainer
    - templates # uses its own cspell config

    - eng # not required
overrides:
    - filename: ./SECURITY.md
      words:
          - MSRC
          - msrc
    - filename: ./docs/specs/metrics-audit/**
      words:
          - vsrpc
          - Buildpacks
          - devdeviceid
          - appinit
          - oneauth
          - dashboarding
          - Pseudonymized
          - pseudonymized
          - unhashed
          - countif
          - Angelos
          - Entra
          - CODEOWNERS
          - weikanglim
    - filename: ./README.md
      words:
          - VSIX
    - filename: ./docs/specs/perf-foundations/**
      words:
          - Alives
          - appsettings
          - appservice
          - armdeploymentstacks
          - azapi
          - azsdk
          - containerapps
          - golangci
          - goroutines
          - httputil
          - keepalives
          - nilerr
          - nolint
          - remotebuild
          - resourcegroup
          - singleflight
          - stdlib
          - whatif
    - filename: schemas/**/azure.yaml.json
      words:
          - prodapi
          - appservice
          - containerapp
          - springapp
          - staticwebapp
          - myapp
          - azdev
          - myimage
          - azureai
          - entra
          - flexconsumption
