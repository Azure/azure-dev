# cspell settings for miscellaneous files thats are not covered by other projects.
# cspell root should be specified as the top-level repository directory.

# Use global config
import: cspell.global.yaml

ignorePaths:
    # Project changes here should be kept in-sync workflow cspell-misc.yml
    - cli # uses its own cspell config
    - ext/vscode # uses its own cspell config
    - ext/devcontainer
    - templates # uses its own cspell config

    - eng # not required
overrides:
    - filename: ./SECURITY.md
      words:
          - MSRC
          - msrc
    - filename: ./docs/specs/metrics-audit/**
      words:
          - vsrpc
          - Buildpacks
          - devdeviceid
          - appinit
          - oneauth
          - dashboarding
          - Pseudonymized
          - pseudonymized
          - unhashed
          - countif
          - Angelos
          - Entra
          - CODEOWNERS
          - weikanglim
    - filename: ./README.md
      words:
          - VSIX
    - filename: ./docs/specs/perf-foundations/**
      words:
          - Alives
          - appsettings
          - appservice
          - armdeploymentstacks
          - azapi
          - azsdk
          - containerapps
          - golangci
          - goroutines
          - httputil
          - keepalives
          - nilerr
          - nolint
          - remotebuild
          - resourcegroup
          - singleflight
          - stdlib
          - whatif
    - filename: ./docs/specs/exegraph/**
      words:
          - stdlib
          - dependson
          - appsettings
    - filename: schemas/**/azure.yaml.json
      words:
          - prodapi
          - appservice
          - containerapp
          - springapp
          - staticwebapp
          - myapp
          - azdev
          - myimage
          - azureai
          - entra
          - flexconsumption
    - filename: docs/architecture/**/*.md
      words:
          - azapi
          - azext
          - appinsights
          - coreai
          - devcliapprequests
          - devdiv
          - dmitryr
          - Errorf
          - GDPRAPI
          - grpcbroker
          - KQLX
          - Kusto
          - Pseudonymized
          - Thhmmss
          - unhashed
          - vsrpc
    - filename: docs/guides/**/*.md
      words:
          - azdext
          - dcount
          - devcliapprequests
          - errorlint
          - Errorf
          - gofmt
          - golangci
          - gosec
          - jaegertracing
          - Kusto
          - mycommand
          - myfeature
          - mypackage
          - pflag
          - Pseudonymized
          - staticcheck
          - stdlib
          - tostring
          - unhashed
          - vsrpc
    - filename: docs/reference/**/*.md
      words:
          - appinit
          - appservice
          - Buildpacks
          - Ccids
          - containerapp
          - dcount
          - devdeviceid
          - Entra
          - Errorf
          - exegraph
          - kqlx
          - Kusto
          - oneauth
          - paas
          - PBIP
          - pbip
          - postprovision
          - preprovision
          - postdeploy
          - pseudonymized
          - remotebuild
          - resourcegroup
          - rollups
          - springapp
          - startswith
          - staticwebapp
          - toreal
          - toscalar
          - tostring
          - Tpid
          - TPID
          - unhashed
          - vsrpc
          - whatif
