template:
  kind: prompt
  name: mcp-tools-agent
  description: Agent with MCP tool connections
  model:
    id: gpt-4o
  tools:
    - kind: mcp
      name: github-mcp
      connection:
        kind: foundry
        endpoint: https://api.githubcopilot.com/mcp/
        name: github-mcp-conn
      url: https://api.githubcopilot.com/mcp/
    - kind: code_interpreter
      name: code-runner
  instructions: |
    You have access to GitHub via MCP and can run code.
