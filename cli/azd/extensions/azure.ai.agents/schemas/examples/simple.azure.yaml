# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# Minimal split Foundry project: one project service with a model deployment and
# one agent service that depends on it.
name: foundry-simple

services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-4o-mini
        model:
          format: OpenAI
          name: gpt-4o-mini
          version: "2024-07-18"
        sku:
          name: GlobalStandard
          capacity: 50

  assistant:
    host: azure.ai.agent
    project: ./agents/assistant
    uses:
      - ai-project
    kind: hosted
    name: assistant
    description: A simple assistant.
    environmentVariables:
      - name: LOG_LEVEL
        value: info
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
