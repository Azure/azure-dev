# Tier 0 (offline) — `init --deploy-mode` value validation.
#
# --deploy-mode is validated early in init, before the wizard or any network
# call. An invalid value must fail fast with the allowed values. This covers the
# invalid-value path; the '--deploy-mode code --no-prompt' missing-flags path is
# validated in the same code (requires --runtime and --entry-point).
name: "init-validate-deploy-mode"
command: "azd ai agent init --deploy-mode bogus --no-prompt"
cwd: "~/working/azd-agents-validate-deploy-mode-val-{instance}"
tags: ["tier:0", "cmd:init", "negative-path", "parallel-safe"]

env:
  AZD_DISABLE_AGENT_DETECT: "1"

pre:
  - run: "rm -rf ~/working/azd-agents-validate-deploy-mode-val-{instance}"
    cwd: "~/working"
    name: "reset to an empty working dir"

goals:
  - "Run 'init --deploy-mode bogus --no-prompt' in an empty directory."
  - "Confirm it exits non-zero immediately with a clear message that --deploy-mode must be 'container' or 'code' (it must NOT hang or prompt despite --no-prompt)."
  - "OPTIONAL second check: run 'azd ai agent init --deploy-mode code --no-prompt' and confirm it fails with a clear message that --runtime (and --entry-point) are required when using code deploy mode with --no-prompt."
  - "Take a screenshot of the error output."
  - "Report a finding if it hangs, prompts despite --no-prompt, or the error does not state the allowed --deploy-mode values."
