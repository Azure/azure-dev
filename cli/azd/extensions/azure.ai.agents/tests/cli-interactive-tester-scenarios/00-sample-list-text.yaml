# Tier 0 (offline) — `sample list` renders the human-readable catalog.
name: "sample-list-text"
command: "azd ai agent sample list"
cwd: "/tmp"
tags: ["tier:0", "cmd:sample", "parallel-safe"]

goals:
  - "Wait for the curated sample catalog to render as human-readable text."
  - "Confirm at least one sample entry is visible with a name/title and a manifest or repo reference usable with 'azd ai agent init -m' or 'azd init -t'. NOTE: the output may overflow the terminal buffer — verifying the full list is not required; confirm the command completed successfully (clean exit, no error) and that visible entries are well-formatted."
  - "Take a screenshot of the catalog output."
  - "Report a finding if the command errors, shows zero entries, or the formatting is broken (missing columns, garbled text)."
