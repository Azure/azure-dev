# Tier 1 (auth, scaffold only) — init from a manifest with explicit --agent-name and --model.
#
# Requires Azure login (see README "Authentication"): `az login --tenant azdaiagent.onmicrosoft.com`. Does NOT run `azd provision`; no cost incurred.
# Also requires GitHub login: `gh auth login` (manifest download can fall back to
# the gh CLI when the anonymous GitHub API is rate-limited). The pre hook fails
# fast if gh is not authenticated.
# Verifies that the override flags are honored in the generated files.
name: "init-flags-agent-name-model"
command: "azd ai agent init -m https://github.com/microsoft/foundry-samples/blob/main/samples/python/hosted-agents/agent-framework/responses/01-basic/agent.manifest.yaml --agent-name trangevi-qa-named-agent-{instance} --model gpt-4.1-mini"
cwd: "~/working/azd-agents-t1-flags-{instance}"

env:
  AZD_DISABLE_AGENT_DETECT: "1"

# Require GitHub auth up front (like az login), then start from a clean dir so a
# prior run's scaffold can't trigger overwrite prompts.
pre:
  - run: "gh auth status || { echo 'ERROR: GitHub CLI not authenticated. Run: gh auth login'; exit 1; }"
    cwd: "~/working"
    name: "require gh auth login (manifest download)"
  - run: "rm -rf ~/working/azd-agents-t1-flags-{instance}"
    cwd: "~/working"
    name: "reset working dir"

goals:
  - "RESOURCE NAMING: whenever you are prompted to NAME a new Azure resource you are creating (Foundry project/account, azd environment, agent, model deployment, or resource group), give it a name prefixed with 'trangevi-' and suffixed with this run's instance id '-{instance}' (e.g. 'trangevi-basic-responses-{instance}') so concurrent instances don't collide on resource names. Some fields lowercase the value and replace invalid characters with hyphens;   that normalization is expected. If a name prompt comes pre-filled with a default value, CLEAR it first (select-all then delete, or backspaces) before typing so your name replaces the default instead of appending to it."
  - "Wait for the manifest to download and parse."
  - "When asked how to deploy, select 'Container' (hosted agent)."
  - "If asked to select an Azure AI Foundry project, choose to create a new one, naming it with the 'trangevi-' prefix, and follow the prompts."
  - "If asked to select a subscription, search for and select the 'azd ai agent development' subscription."
  - "If asked for a location/region, select 'East US 2'."
  - "Accept any remaining model defaults (version, SKU, capacity). If prompted for a model deployment name, use a 'trangevi-'-prefixed name."
  - "If asked for container/resource size, select 'Small'."
  - "Wait for initialization to complete — look for 'Next:' or a success message."
  - "Verify the overrides: confirm agent.yaml records the Foundry agent name as 'trangevi-qa-named-agent-{instance}' (the flag value passed via --agent-name) and the model 'gpt-4.1-mini' — the values passed via flags, not the manifest defaults."
  - "Take a screenshot of the completed init output."
  - "STOP here — do NOT run 'azd provision'. Report a finding if --agent-name or --model is ignored, or if the wizard still prompts for these values despite the flags."
