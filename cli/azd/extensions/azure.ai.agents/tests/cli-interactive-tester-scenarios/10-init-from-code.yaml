# Tier 1 (auth, scaffold only) — init from existing code in the current directory.
#
# Requires Azure login (see README "Authentication"). Does NOT run `azd provision`;
# no cost incurred.
# Precondition: the cwd should already contain agent source code (and ideally an
# agent manifest). The pre hooks seed a committed Python fixture so this is
# guaranteed and the run is idempotent. Override the fixture location with
# AZD_AGENTS_FIXTURES if your repo is checked out elsewhere.
name: "init-from-code"
command: "azd ai agent init"
cwd: "~/working/azd-agents-t1-from-code-{instance}"
tags: ["tier:1", "cmd:init", "parallel-safe"]

env:
  AZD_DISABLE_AGENT_DETECT: "1"

pre:
  - run: "rm -rf ~/working/azd-agents-t1-from-code-{instance}"
    cwd: "~/working"
    name: "reset working dir"
  - run: "mkdir -p ~/working/azd-agents-t1-from-code-{instance} && cp -r \"${AZD_AGENTS_FIXTURES:?Set AZD_AGENTS_FIXTURES to the WSL path of your fixtures directory (e.g. /mnt/d/w1/azure-dev/.../tests/cli-interactive-tester-scenarios/fixtures)}/from-code/.\" ~/working/azd-agents-t1-from-code-{instance}/"
    cwd: "~/working"
    name: "seed from-code agent fixture (app.py + requirements.txt)"

goals:
  - "RESOURCE NAMING: whenever you are prompted to NAME a new Azure resource you are creating (Foundry project/account, azd environment, agent, model deployment, or resource group), give it a name prefixed with '{prefix}-' and suffixed with this run's instance id '-{instance}' (e.g. '{prefix}-basic-responses-{instance}') so concurrent instances don't collide on resource names. Some fields lowercase the value and replace invalid characters with hyphens; that normalization is expected. If a name prompt comes pre-filled with a default value, CLEAR it first (select-all then delete, or backspaces) before typing so your name replaces the default instead of appending to it."
  - "At the first 'How do you want to initialize your agent?' prompt, select 'Use the code in the current directory' (this is the from-code flow; there is no --from-code flag)."
  - "Wait for the tool to inspect the current directory and treat its code as the agent source."
  - "If an existing agent manifest is detected, confirm that you want to reuse it (answer yes / confirm)."
  - "If asked to select an Azure AI Foundry project, choose to create a new one, naming it with the '{prefix}-' prefix, and follow the prompts."
  - "If asked to select a subscription, search for and select the '{subscription}' subscription."
  - "If asked for a location/region, select '{region}'."
  - "If asked to select a model, choose '{model}' and accept the remaining model defaults."
  - "Wait for initialization to complete — look for 'Next:' in the output."
  - "Verify the scaffold: confirm azure.yaml was created/updated to reference the local code as an azure.ai.agent service, and that a .agentignore file was generated."
  - "Take a screenshot of the completed init output."
  - "STOP here — do NOT run 'azd provision'. Report a finding if code-detection misbehaves or if the manifest-reuse prompt is confusing."
