# Tier 1 (auth, scaffold only) — init from an existing agent manifest URL.
#
# Requires `azd auth login`. Does NOT run `azd provision`; no cost incurred.
name: "init-from-manifest-url"
command: "azd ai agent init -m https://github.com/microsoft/foundry-samples/blob/main/samples/python/hosted-agents/agent-framework/responses/01-basic/agent.manifest.yaml"
cwd: "~/working/azd-agents-t1-manifest"

env:
  AZD_DISABLE_AGENT_DETECT: "1"

# Start from a clean dir so a prior run's scaffold can't trigger overwrite prompts.
pre:
  - run: "rm -rf ~/working/azd-agents-t1-manifest"
    cwd: "~/working"
    name: "reset working dir"

goals:
  - "Wait for the tool to fetch and parse the manifest from the provided URL."
  - "When asked how to deploy, select 'Container' (hosted agent)."
  - "If asked to select an Azure AI Foundry project, choose to create a new one and follow the prompts."
  - "If asked to select a subscription, search for and select the 'azd ai agent development' subscription."
  - "If asked for a location/region, select 'East US 2'."
  - "When asked to select a model, choose 'gpt-4.1-mini' (or accept the manifest's model if one is pinned)."
  - "Accept the defaults for any remaining model prompts (version, SKU, capacity, deployment name)."
  - "If asked for container/resource size, select 'Small'."
  - "Wait for initialization to complete — look for 'Next:' or a success message."
  - "Verify the scaffold: confirm azure.yaml exists and the agent.yaml reflects the manifest's agent definition."
  - "Take a screenshot of the completed init output."
  - "STOP here — do NOT run 'azd provision'. Report a finding if the manifest fails to download/parse, or if any field is dropped during scaffold."
