# Tier 1 (auth, scaffold only) — init from a Python template, stop before provision.
#
# Requires `azd auth login`. Reads subscriptions/Foundry projects but does NOT
# run `azd provision`, so no resources are created and no cost is incurred.
name: "init-template-python"
command: "azd ai agent init"
cwd: "~/working/azd-agents-t1-python"

env:
  AZD_DISABLE_AGENT_DETECT: "1"

# Start from a clean dir so a prior run's scaffold can't trigger overwrite prompts.
pre:
  - run: "rm -rf ~/working/azd-agents-t1-python"
    cwd: "~/working"
    name: "reset working dir"

goals:
  - "When asked how to initialize, select 'Start new from a template'."
  - "Select Python as the language."
  - "Pick the first starter template in the list."
  - "When asked how to deploy, select 'Container' (hosted agent)."
  - "If asked to select an Azure AI Foundry project, choose to create a new one and follow the prompts."
  - "If asked to select a subscription, search for and select the 'azd ai agent development' subscription."
  - "If asked for a location/region, select 'East US 2'."
  - "When asked to select a model, choose 'gpt-4.1-mini'."
  - "Accept the defaults for model version, SKU, capacity, and deployment name."
  - "If asked for container/resource size, select 'Small'."
  - "Wait for initialization to complete — look for 'Next:' or a success message."
  - "Verify the scaffold: confirm azure.yaml exists and references an azure.ai.agent service, and that an agent.yaml was generated."
  - "Take a screenshot of the completed init output."
  - "STOP here — do NOT run 'azd provision'. Report a finding for any confusing prompt, wrong default, or scaffold problem."
