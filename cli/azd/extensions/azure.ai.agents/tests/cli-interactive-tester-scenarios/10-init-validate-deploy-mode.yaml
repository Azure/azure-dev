# Tier 1 (auth, scaffold only) — `init --deploy-mode` value validation.
#
# Requires Azure login (see README "Authentication"). Does NOT run `azd provision`;
# no cost incurred.
#
# IMPORTANT: --deploy-mode is validated by validateCodeDeployInput, which is only
# reached AFTER init resolves an initialization METHOD. In an empty directory with
# --no-prompt there is no resolvable method, so init fails earlier with "template
# selection requires interactive mode" and the deploy-mode check never runs. To
# actually exercise the deploy-mode validation we seed a from-code fixture so the
# from-code method resolves, the starter template is scaffolded, and then the
# bogus --deploy-mode value is rejected. (Reaching the validation downloads a
# starter template, which is why this is Tier 1 rather than offline Tier 0.)
name: "init-validate-deploy-mode"
command: "azd ai agent init --deploy-mode bogus --no-prompt"
cwd: "~/working/azd-agents-validate-deploy-mode-{instance}"
tags: ["tier:1", "cmd:init", "negative-path", "parallel-safe"]

env:
  AZD_DISABLE_AGENT_DETECT: "1"

# Seed a committed from-code fixture so init resolves the from-code method and
# reaches validateCodeDeployInput. Override the fixture location with
# AZD_AGENTS_FIXTURES if needed.
pre:
  - run: "rm -rf ~/working/azd-agents-validate-deploy-mode-{instance}"
    cwd: "~/working"
    name: "reset working dir"
  - run: "mkdir -p ~/working/azd-agents-validate-deploy-mode-{instance} && cp -r \"${AZD_AGENTS_FIXTURES:?Set AZD_AGENTS_FIXTURES to the WSL path of your fixtures directory (e.g. /mnt/d/w1/azure-dev/.../tests/cli-interactive-tester-scenarios/fixtures)}/from-code/.\" ~/working/azd-agents-validate-deploy-mode-{instance}/"
    cwd: "~/working"
    name: "seed from-code agent fixture (app.py + requirements.txt)"

goals:
  - "Run 'init --deploy-mode bogus --no-prompt' in the seeded from-code directory."
  - "Allow init to resolve the from-code method and scaffold the starter template (it may print 'Template initialized')."
  - "Confirm it then exits non-zero with a clear message that --deploy-mode must be 'container' or 'code' (suggestion: 'Specify --deploy-mode container or --deploy-mode code'). It must NOT hang or prompt despite --no-prompt, and must NOT provision any Azure resources."
  - "OPTIONAL second check: in a freshly seeded copy of the fixture, run 'azd ai agent init --deploy-mode code --no-prompt' and confirm it fails with a clear message that --runtime (and --entry-point) are required when using code deploy mode with --no-prompt."
  - "Take a screenshot of the error output."
  - "STOP here — do NOT run 'azd provision'. Report a finding if it hangs, prompts despite --no-prompt, provisions resources, or the error does not state the allowed --deploy-mode values. Note as a minor finding that the starter template is scaffolded BEFORE the deploy-mode flag is validated (late validation)."
