# Tier 2 (cloud E2E) — SETUP: deploy the shared agent used by all 21-..2A scenarios.
#
# ⚠️ Incurs Azure cost. Run this FIRST. `init` runs in ~/working/azd-agents-shared
# and scaffolds the project into a subdirectory named after the agent, so the
# deployed project lives in ~/working/azd-agents-shared/trangevi-basic-responses
# and is reused by the targeted scenarios. The agent name MUST be exactly
# 'trangevi-basic-responses' so that subdirectory path is deterministic. Run
# 2Z-teardown-down.yaml LAST to clean up.
name: "setup-deploy-shared-agent"
command: "azd ai agent init"
cwd: "~/working/azd-agents-shared"

env:
  AZD_DISABLE_AGENT_DETECT: "1"

# Idempotent setup: if a previous run left a project here, tear down its Azure
# resources FIRST (so we never orphan them), then clear the dir for a fresh
# deploy. The down step gets a long timeout and continues on error (there may be
# nothing to tear down). Re-using a clean path also avoids the resource-name hash
# collision in issue #8360.
pre:
  - run: "if [ -f ~/working/azd-agents-shared/trangevi-basic-responses/azure.yaml ]; then (cd ~/working/azd-agents-shared/trangevi-basic-responses && azd down --force --purge); fi"
    cwd: "~/working/azd-agents-shared"
    name: "tear down any leftover deployed agent"
    continue_on_error: true
    timeout: 900
  - run: "rm -rf ~/working/azd-agents-shared"
    cwd: "~/working"
    name: "clear the shared working dir"

goals:
  - "RESOURCE NAMING: whenever you are prompted to NAME a new Azure resource you are creating (Foundry project/account, azd environment, agent, model deployment, or resource group), give it a name prefixed with 'trangevi-' (e.g. 'trangevi-basic-responses'). Some fields lowercase the value and replace invalid characters with hyphens; that normalization is expected. If a name prompt comes pre-filled with a default value, CLEAR it first (select-all then delete, or backspaces) before typing so your name replaces the default instead of appending to it."
  - "When asked how to initialize, select 'Start new from a template'."
  - "Select Python as the language."
  - "Select the 'Basic Responses' template from the list."
  - "When prompted for the AGENT NAME, set it to EXACTLY 'trangevi-basic-responses' (clear any pre-filled default first, then type it). This exact name is REQUIRED: init scaffolds the project into a subdirectory named after the agent, and the targeted reuse scenarios depend on that subdirectory being named 'trangevi-basic-responses'."
  - "When asked how to deploy, select 'Container' (hosted agent)."
  - "If asked to select an Azure AI Foundry project, create a new one, naming it with the 'trangevi-' prefix, and follow the prompts."
  - "If asked to select a subscription, search for and select the 'azd ai agent development' subscription."
  - "If asked for a location/region, select 'East US 2'."
  - "When asked to select a model, choose 'gpt-4.1-mini'."
  - "Accept the defaults for model version, SKU, capacity. If prompted for a model deployment name, use a 'trangevi-'-prefixed name."
  - "If asked for container/resource size, select 'Small'."
  - "Wait for initialization to complete — look for 'Next:' or a success message."
  - "Change directory into the new 'trangevi-basic-responses' subdirectory (run 'cd trangevi-basic-responses') — init scaffolds the project into a subdirectory named after the agent, so azure.yaml lives there, not in the current directory."
  - "Run 'azd provision' (from inside the 'trangevi-basic-responses' subdirectory) and wait for it to succeed. This provisions the Azure infrastructure (Foundry project/account, model deployment, etc.) but does NOT yet deploy the agent."
  - "After provision succeeds, run 'azd deploy' (from the same subdirectory) and wait for it to succeed. This deploys the agent to the provisioned infrastructure — it is a required, separate step from provision before the agent can be shown or invoked."
  - "After deploy, run 'azd ai agent show' and note the agent name and endpoint URL — record these for the targeted scenarios."
  - "Take a screenshot of the successful provision, deploy, and 'show' output."
  - "Report a finding if init, provision, or deploy fails, hangs, or produces a confusing error. Do NOT run 'azd down' here — teardown is a separate scenario."
