# Tier 2 (cloud E2E) — `invoke --new-session` resets conversation state.
#
# Precondition: 20-setup-deploy-shared-agent.yaml has been run successfully.
name: "invoke-new-session"
command: "bash"
cwd: "~/working/azd-agents-shared/trangevi-basic-responses"

# Precondition guard: warn (do not hard-fail) if the shared agent is not deployed.
pre:
  - run: "test -f ~/working/azd-agents-shared/trangevi-basic-responses/azure.yaml && echo 'OK: shared agent project found' || echo 'PRECONDITION FAILED: shared agent not found - run 20-setup-deploy-shared-agent.yaml first'"
    cwd: "~/working/azd-agents-shared/trangevi-basic-responses"
    name: "assert shared agent is deployed"
    continue_on_error: true

goals:
  - "Run: azd ai agent invoke \"My name is Quinn. Remember it.\" and wait for a response."
  - "Run: azd ai agent invoke \"What is my name?\" and confirm the agent recalls 'Quinn' (the persisted session reused the same conversation)."
  - "Run: azd ai agent invoke --new-session \"What is my name?\" and confirm the agent does NOT recall 'Quinn' — the new session discarded prior history."
  - "Take a screenshot after each invoke."
  - "Report a finding if --new-session still carries over prior conversation context, or if session persistence between the first two invokes does not work."
