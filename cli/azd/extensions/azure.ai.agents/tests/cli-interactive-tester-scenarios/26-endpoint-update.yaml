# Tier 2 (cloud E2E) — `endpoint update` patches endpoint/card without a new version.
#
# Precondition: 20-setup-deploy-shared-agent.yaml has been run successfully.
name: "endpoint-update"
command: "azd ai agent endpoint update"
cwd: "~/working/azd-agents-shared/{shared_agent_name}"
tags: ["tier:2", "cmd:endpoint", "serial-only"]

# Precondition guard: warn (do not hard-fail) if the shared agent is not deployed.
pre:
  - run: "test -f ~/working/azd-agents-shared/{shared_agent_name}/azure.yaml && echo 'OK: shared agent project found' || echo 'PRECONDITION FAILED: shared agent not found - run 20-setup-deploy-shared-agent.yaml first'"
    cwd: "~/working/azd-agents-shared/{shared_agent_name}"
    name: "assert shared agent is deployed"
    continue_on_error: true
  # `endpoint update` reads agentEndpoint/agentCard from the azure.yaml service
  # properties (via LoadAgentDefinition) and errors ("nothing to update") if
  # neither is defined. The Basic Responses template defines neither, so inject a
  # minimal agentCard into the azure.yaml service properties (idempotently) before
  # the run so there is something to patch.
  - run: |
      f="~/working/azd-agents-shared/{shared_agent_name}/azure.yaml"
      if [ -f "$f" ] && ! grep -q 'agentCard:' "$f"; then
        python3 -c "
import sys, yaml
with open(sys.argv[1]) as fh:
    doc = yaml.safe_load(fh)
for svc in doc.get('services', {}).values():
    if svc.get('host') == 'azure.ai.agent':
        props = svc.setdefault('config', {})
        props['agentCard'] = {
            'description': '{prefix} endpoint-update test card',
            'skills': [{'id': '{prefix}-echo', 'name': 'Echo', 'description': 'Echoes input back'}]
        }
        break
with open(sys.argv[1], 'w') as fh:
    yaml.dump(doc, fh, default_flow_style=False, sort_keys=False)
print('Injected agentCard into azure.yaml')
" "$f"
      else
        echo "agentCard already present or azure.yaml not found"
      fi
    cwd: "~/working/azd-agents-shared/{shared_agent_name}"
    name: "inject agentCard into azure.yaml so there is something to patch"
    continue_on_error: true

goals:
  - "Run endpoint update for the default (auto-detected) agent service. NOTE: a minimal agentCard was injected into azure.yaml service properties during setup so the patch has content."
  - "Confirm it patches the existing deployed agent's endpoint/card configuration and explicitly does NOT create a new agent version."
  - "After it completes, run 'azd ai agent show' and confirm the agent version is unchanged from before the update."
  - "Take a screenshot of the update result and the post-update 'show' output."
  - "Report a finding if endpoint update creates a new version, errors against an already-deployed agent, or gives a confusing result."
