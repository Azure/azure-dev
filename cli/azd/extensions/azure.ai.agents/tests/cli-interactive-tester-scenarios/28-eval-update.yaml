# Tier 2 (cloud E2E) — `eval update` refreshes dataset and evaluators.
#
# Precondition: 28-eval-init-run-show.yaml has been run so an eval.yaml exists.
name: "eval-update"
command: "bash"
cwd: "~/working/azd-agents-shared/trangevi-basic-responses"

# Precondition guard: warn (do not hard-fail) if the shared agent is not deployed.
pre:
  - run: "test -f ~/working/azd-agents-shared/trangevi-basic-responses/azure.yaml && echo 'OK: shared agent project found' || echo 'PRECONDITION FAILED: shared agent not found - run 20-setup-deploy-shared-agent.yaml first'"
    cwd: "~/working/azd-agents-shared/trangevi-basic-responses"
    name: "assert shared agent is deployed"
    continue_on_error: true

goals:
  - "Confirm an eval.yaml from a prior 'eval init' exists in the project root (run 28-eval-init-run-show.yaml first if not)."
  - "Run: azd ai agent eval update --dataset-only and confirm only the dataset is updated (evaluators left unchanged)."
  - "Run: azd ai agent eval update --evaluator-only and confirm only the evaluators are updated (dataset left unchanged)."
  - "Take a screenshot after each update."
  - "Report a finding if --dataset-only or --evaluator-only updates the wrong thing, errors, or prompts despite the scoping flag."
