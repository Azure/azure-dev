# Tier 2 (cloud E2E) — `code download` against a code-based agent (positive path).
#
# The shared agent uses code deploy mode (auto-selected for Python templates).
# `code download` retrieves the deployed source. This scenario verifies the CLI
# downloads the agent code and extracts it into the destination directory.
#
# Precondition: 20-setup-deploy-shared-agent.yaml has been run successfully.
name: "code-download"
command: "azd ai agent code download --dest ~/working/azd-agents-shared/code-download-test"
cwd: "~/working/azd-agents-shared/{shared_agent_name}"
tags: ["tier:2", "cmd:code", "serial-only"]

pre:
  - run: "test -f ~/working/azd-agents-shared/{shared_agent_name}/azure.yaml && echo 'OK: shared agent project found' || echo 'PRECONDITION FAILED: shared agent not found - run 20-setup-deploy-shared-agent.yaml first'"
    cwd: "~/working/azd-agents-shared/{shared_agent_name}"
    name: "assert shared agent is deployed"
    continue_on_error: true
  - run: "rm -rf ~/working/azd-agents-shared/code-download-test"
    name: "clean destination directory"
    continue_on_error: true

goals:
  - "Run code download against the shared agent (which is code-based)."
  - "Confirm the command exits successfully (zero exit code)."
  - "Confirm that agent source files are downloaded into the destination directory (~/working/azd-agents-shared/code-download-test). Run 'ls ~/working/azd-agents-shared/code-download-test' to verify files exist (e.g. app.py, requirements.txt, or similar Python source files)."
  - "Take a screenshot of the successful download output and the directory listing."
  - "Report a finding if the command fails, hangs, returns an error about the agent not being code-based, or downloads an empty directory."
