# Tier 2 (cloud E2E) — TEARDOWN: destroy all resources created by the setup scenario.
#
# ⚠️ Run this LAST, after all 21-..2A targeted scenarios are done. Cleans up the
# shared agent and its Azure resources to stop incurring cost.
name: "teardown-down"
command: "azd down --force --purge"
cwd: "~/working/azd-agents-shared/{shared_agent_name}"
tags: ["tier:2", "cmd:down", "serial-only"]

goals:
  - "Run 'azd down --force --purge' in the shared project directory."
  - "Wait for the full teardown to complete — all resources (Foundry account/project, model deployment, container resources) should be deleted and purged."
  - "Confirm the command reports success and no resources are left behind."
  - "Take a screenshot of the completed teardown."
  - "Report a finding if teardown fails, leaves orphaned resources, or hangs."

# After the in-session teardown, clear the shared working dir so the next full
# Tier 2 pass starts clean. continue_on_error so a missing dir is not fatal.
post:
  - run: "rm -rf ~/working/azd-agents-shared"
    cwd: "~/working"
    name: "clear the shared working dir"
    continue_on_error: true
