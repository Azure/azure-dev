import: ../../.vscode/cspell.yaml
words:
  # Help styling helpers (cli/azd/extensions/*/internal/helpformat)
  - helpformat
  - cmdhelp
  # Pre-existing terms in shipped agent topic markdown bodies
  - myteam
  - myproj
  - sess
  # AgentSchema connection categories referenced in shipped topic markdown
  - Qdrant
  # Filenames + tool names referenced in shipped topic markdown
  - agentignore
  - mypy
  # Tool description term used in shipped extend topic body
  - Sandboxed
  # SKILL.md description term
  - scriptable
  # Microsoft-managed OAuth connector identifier (Foundry-side fixed string)
  - foundrygithubmcp
  # Placeholder names used in shipped sample snippets
  - myregistry
  - myagent
  # MCP server / connection names used in shipped recipes (real Foundry sample)
  - workiq
  # Azure Data Lake Storage shorthand referenced in categories table
  - ADLS
  # PARAM_* env-var fragments generated by credentialEnvVarName
  - CLIENTID
  - CLIENTSECRET
  # Python sample identifiers used in shipped toolbox/consume.md
  - asyncio
  - streamablehttp
  - streamable
  - httpx
  # Plain English used in shipped toolbox topic
  - uppercased
  # Filesystem terms used in skill_install.go (target directories + cross-filesystem renames)
  - subdirs
  - tmpfs
  # Used in skill_install.go comments describing the JSON wire shape
  - parseable
  # Foundry-skills terms used in skill/* topic markdown bodies.
  # `agentskills` references the agentskills.io naming spec.
  # `repoint` / `repoints` describe the metadata-only default-version
  # update flow on Foundry skills (mirrors azure.ai.skills cspell.yaml).
  - agentskills
  - repoint
  - repoints
overrides:
  - filename: internal/cmd/doc_catalog.go
    words:
      # Intentional typo in a comment documenting yaml.v3 typo-detection.
      - ordr
  - filename: internal/cmd/doc_catalog_test.go
    words:
      - ordr
