# yaml-language-server: $schema=../extension.schema.json
id: azure.ai.inspector
namespace: ai.inspector
displayName: Foundry agent inspector (Preview)
description: Browser-based inspector UI for locally running Foundry agents. (Preview)
usage: azd ai inspector <command> [options]
# NOTE: Make sure version.txt is in sync with this version.
version: 0.1.0-preview
requiredAzdVersion: ">1.23.13"
language: go
capabilities:
  - custom-commands
  - metadata
examples:
  - name: launch
    description: Launch the inspector against a local agent on the default port (8088).
    usage: azd ai inspector launch
  - name: launch with explicit ports
    description: Launch the inspector against a local agent on a custom port and serve the UI on a custom port.
    usage: azd ai inspector launch --port 9000 --inspector-port 9001
