id: azure.ai.models
namespace: ai.models
displayName: Foundry Custom Models (Preview)
description: Extension for managing custom models in Azure AI Foundry. (Preview)
usage: azd ai models <command> [options]
version: 0.0.7-preview
language: go
capabilities:
    - custom-commands
    - metadata
examples:
    - name: init
      description: Initialize a new AI models project.
      usage: azd ai models init
    - name: create
      description: Upload and register a custom model.
      usage: azd ai models create --source ./model.safetensors --name my-model --base-model FW-DeepSeek-V3.1
    - name: list
      description: List all custom models.
      usage: azd ai models list
    - name: show
      description: Show details of a custom model.
      usage: azd ai models show --name my-model
    - name: update
      description: Update description or tags of a custom model.
      usage: azd ai models update --name my-model --description "New description" --set-tag env=prod
    - name: delete
      description: Delete a custom model.
      usage: azd ai models delete --name my-model
