# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/refs/heads/main/cli/azd/extensions/extension.schema.json
capabilities:
  - custom-commands
  - metadata
description: Manage RLE resources from your terminal. (Preview)
displayName: RLE (Preview)
id: azure.ai.rle
language: go
namespace: ai.rle
tags:
  - ai
  - rle
usage: azd ai rle <command> [options]
version: 0.1.0-preview
examples:
  - name: init
    description: Scaffold a local RLE environment.
    usage: azd ai rle init
  - name: deploy
    description: Create or update the RLE environment.
    usage: azd ai rle deploy --project-id <project-id>
  - name: run
    description: Pull and run the local RLE environment container.
    usage: azd ai rle run
  - name: invoke
    description: Open an OpenEnv runtime shell.
    usage: azd ai rle invoke --local
