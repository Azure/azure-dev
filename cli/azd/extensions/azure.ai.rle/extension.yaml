# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/refs/heads/main/cli/azd/extensions/extension.schema.json
capabilities:
  - custom-commands
  - metadata
description: Manage RLE resources from your terminal. (Preview)
displayName: RLE (Preview)
id: azure.ai.rle
language: go
namespace: ai.rle
tags:
  - ai
  - rle
usage: azd ai rle <command> [options]
version: 0.1.0-preview
examples:
  - name: create
    description: Create or update an RLE environment.
    usage: azd ai rle create <name> --endpoint http://localhost:5000 --account local --project demo
  - name: list
    description: List RLE environments.
    usage: azd ai rle list --endpoint http://localhost:5000 --account local --project demo
  - name: show
    description: Show an RLE environment.
    usage: azd ai rle show <environment-id> --endpoint http://localhost:5000 --account local --project demo
  - name: versions
    description: List RLE environment versions.
    usage: azd ai rle versions <environment-id> --endpoint http://localhost:5000 --account local --project demo
  - name: modify
    description: Modify an existing RLE resource.
    usage: azd ai rle modify <name>