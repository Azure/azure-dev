# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/refs/heads/main/cli/azd/extensions/extension.schema.json
capabilities:
    - custom-commands
    - service-target-provider
    - metadata
description: Manage Microsoft Foundry Toolboxes from your terminal. (Preview)
displayName: Foundry Toolboxes (Preview)
id: azure.ai.toolboxes
language: go
namespace: ai.toolbox
providers:
    - name: azure.ai.toolbox
      type: service-target
      description: Upserts Foundry toolboxes declared as azure.ai.toolbox services in azure.yaml
tags:
    - ai
    - toolbox
usage: azd ai toolbox <command> [options]
version: 0.1.2-preview
