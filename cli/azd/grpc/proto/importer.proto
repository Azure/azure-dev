syntax = "proto3";

package azdext;

option go_package = "github.com/azure/azure-dev/cli/azd/pkg/azdext";

import "models.proto";
import "errors.proto";

service ImporterService {
  // Bidirectional stream for importer requests and responses
  rpc Stream(stream ImporterMessage) returns (stream ImporterMessage);
}

// Envelope for all possible importer messages (requests and responses)
message ImporterMessage {
  string request_id = 1;
  ExtensionError error = 99;
  oneof message_type {
    RegisterImporterRequest register_importer_request = 2;
    RegisterImporterResponse register_importer_response = 3;
    ImporterCanImportRequest can_import_request = 4;
    ImporterCanImportResponse can_import_response = 5;
    ImporterServicesRequest services_request = 6;
    ImporterServicesResponse services_response = 7;
    ImporterProjectInfrastructureRequest project_infrastructure_request = 8;
    ImporterProjectInfrastructureResponse project_infrastructure_response = 9;
    ImporterGenerateAllInfrastructureRequest generate_all_infrastructure_request = 10;
    ImporterGenerateAllInfrastructureResponse generate_all_infrastructure_response = 11;
    ImporterProgressMessage progress_message = 12;
  }
}

// --- Registration ---

// Request to register an importer provider
message RegisterImporterRequest {
  string name = 1; // unique identifier for the importer (e.g., "aspire", "spring")
}

message RegisterImporterResponse {
  // Empty for now
}

// --- CanImport ---

message ImporterCanImportRequest {
  ServiceConfig service_config = 1;
}

message ImporterCanImportResponse {
  bool can_import = 1;
}

// --- Services ---

message ImporterServicesRequest {
  ProjectConfig project_config = 1;
  ServiceConfig service_config = 2;
}

message ImporterServicesResponse {
  map<string, ServiceConfig> services = 1;
}

// --- ProjectInfrastructure ---

message ImporterProjectInfrastructureRequest {
  ServiceConfig service_config = 1;
}

message ImporterProjectInfrastructureResponse {
  InfraOptions infra_options = 1;
  // Generated infrastructure files to write to the temp directory
  repeated GeneratedFile files = 2;
}

// --- GenerateAllInfrastructure ---

message ImporterGenerateAllInfrastructureRequest {
  ProjectConfig project_config = 1;
  ServiceConfig service_config = 2;
}

message ImporterGenerateAllInfrastructureResponse {
  // All generated infrastructure files
  repeated GeneratedFile files = 1;
}

// --- Common types ---

// GeneratedFile represents a file generated by an importer
message GeneratedFile {
  string path = 1;    // relative path within the output directory
  bytes content = 2;  // file contents
}

// Progress message for importer operations
message ImporterProgressMessage {
  string request_id = 1;
  string message = 2;
  int64 timestamp = 3; // Unix timestamp in milliseconds
}
