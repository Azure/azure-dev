# yaml-language-server: $schema=error_suggestions.schema.json
# Error Suggestions Configuration
# ================================
# This file maps well-known error patterns to user-friendly messages and actionable suggestions.
# Rules are evaluated in order; the first matching rule wins.
#
# Matching Fields (at least one required):
#   - patterns:   List of strings/regex to match against error message text
#   - errorType:  Go error struct type name to match via reflection (e.g., "AzureDeploymentError")
#   - properties: Map of dot-path property names to expected values on the matched error type
#
# When multiple matching fields are specified, ALL must match for the rule to trigger.
#
# Response Fields:
#   - message:    User-friendly explanation of what went wrong
#   - suggestion: Actionable next steps to resolve the issue
#   - links:      Optional list of reference links (each with url and optional title)
#   - handler:    Optional name of a registered ErrorHandler for dynamic suggestions
#
# Pattern Types:
#   - Default: Case-insensitive substring match (e.g., "quota exceeded")
#   - Regex: Set "regex: true" on the rule to treat all patterns and property
#     values as regular expressions (e.g., "BCP\\d{3}")
#
# Examples:
#   # Text pattern matching:
#   - patterns:
#       - "some error text"
#     message: "A brief, user-friendly explanation."
#     suggestion: "Clear instruction on how to fix."
#
#   # Typed error matching with properties:
#   - errorType: "DeploymentErrorLine"
#     properties:
#       Code: "InsufficientQuota"
#     message: "Quota limit reached."
#     suggestion: "Request a quota increase."

rules:
  # ============================================================================
  # ORDERING: Most specific rules first, least specific last.
  # Typed error rules (errorType + properties) are naturally more specific
  # than text-only pattern rules. Within each group, rules with additional
  # constraints (patterns, keywords) come before bare code matches.
  # ============================================================================

  # ============================================================================
  # ARM Deployment Errors — Soft-delete conflicts (most specific first)
  # 4th most common error category (~128,054 errors in 90-day analysis)
  # ============================================================================

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "FlagMustBeSetForRestore"
    message: "A soft-deleted resource with this name exists and is blocking deployment."
    suggestion: >
      Purge the resource in the Azure portal or via the Azure CLI,
      then retry with 'azd up'. If the resources are still provisioned,
      running 'azd down --purge' will delete and purge them.
    links:
      - url: "https://learn.microsoft.com/azure/key-vault/general/key-vault-recovery"
        title: "Azure Key Vault soft-delete recovery"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "ConflictError"
    message: "A resource conflict occurred, possibly caused by a soft-deleted resource."
    suggestion: >
      Purge the resource in the Azure portal or via the Azure CLI,
      then retry with 'azd up'. If the resources are still provisioned,
      running 'azd down --purge' will delete and purge them.

  # Conflict + soft-delete keywords (more specific than bare Conflict)
  - errorType: "DeploymentErrorLine"
    regex: true
    properties:
      Code: "Conflict"
    patterns:
      - "(?i)soft.?delete"
      - "(?i)purge"
      - "(?i)deleted vault"
      - "(?i)deleted resource"
      - "(?i)recover or purge"
    message: "A soft-deleted resource is causing a deployment conflict."
    suggestion: >
      Purge the soft-deleted resource in the Azure portal or via the
      Azure CLI, then retry with 'azd up'. If the resources are still
      provisioned, running 'azd down --purge' will delete and purge them.
    links:
      - url: "https://learn.microsoft.com/azure/key-vault/general/key-vault-recovery"
        title: "Azure Key Vault soft-delete recovery"

  - errorType: "DeploymentErrorLine"
    regex: true
    properties:
      Code: "RequestConflict"
    patterns:
      - "(?i)soft.?delete"
      - "(?i)purge"
      - "(?i)deleted vault"
      - "(?i)deleted resource"
      - "(?i)recover or purge"
    message: "A soft-deleted resource is causing a deployment conflict."
    suggestion: >
      Purge the soft-deleted resource in the Azure portal or via the
      Azure CLI, then retry with 'azd up'. If the resources are still
      provisioned, running 'azd down --purge' will delete and purge them.

  # ============================================================================
  # ARM Deployment Errors — Specific error codes
  # ============================================================================

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "InsufficientQuota"
    message: "Your subscription has insufficient quota for this resource."
    suggestion: >
      Check current usage with 'az vm list-usage --location <region>'
      or request a quota increase in the Azure portal.
    links:
      - url: "https://learn.microsoft.com/azure/quotas/quickstart-increase-quota-portal"
        title: "Increase Azure subscription quotas"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "SubscriptionIsOverQuotaForSku"
    message: "Your subscription quota for this SKU is exceeded."
    suggestion: "Request a quota increase or use a different SKU."
    links:
      - url: "https://learn.microsoft.com/azure/quotas/quickstart-increase-quota-portal"
        title: "Increase Azure subscription quotas"

  # ResponseError from ARM SDK (e.g., validation fails before polling)
  - errorType: "ResponseError"
    properties:
      ErrorCode: "LocationNotAvailableForResourceType"
    handler: "resourceNotAvailableHandler"
    links:
      - url: "https://learn.microsoft.com/azure/azure-resource-manager/troubleshooting/error-sku-not-available"
        title: "Resolve SKU not available errors"
      - url: "https://azure.microsoft.com/explore/global-infrastructure/products-by-region/table"
        title: "Azure products available by region"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "LocationNotAvailableForResourceType"
    handler: "resourceNotAvailableHandler"
    links:
      - url: "https://learn.microsoft.com/azure/azure-resource-manager/troubleshooting/error-sku-not-available"
        title: "Resolve SKU not available errors"
      - url: "https://azure.microsoft.com/explore/global-infrastructure/products-by-region/table"
        title: "Azure products available by region"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "InvalidResourceGroupLocation"
    message: "The resource group location conflicts with the deployment."
    suggestion: >
      This usually means the resource group already exists in a different region
      than the one you specified. Either use the existing resource group's region
      with 'azd env set AZURE_LOCATION <existing-region>', create a new environment
      with 'azd env new', or delete the existing resource group and retry.
    links:
      - url: "https://learn.microsoft.com/azure/azure-resource-manager/management/manage-resource-groups-portal"
        title: "Manage Azure resource groups"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "AuthorizationFailed"
    message: "You do not have sufficient permissions for this deployment."
    suggestion: >
      Ensure you have the required RBAC role (e.g., Owner or Contributor)
      on the target subscription. If the template creates role assignments,
      the Owner or User Access Administrator role is required.
    links:
      - url: "https://learn.microsoft.com/azure/role-based-access-control/role-assignments-portal"
        title: "Assign Azure roles"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "Unauthorized"
    message: "The request was unauthorized."
    suggestion: >
      Run 'azd auth login' to re-authenticate, then verify you have
      the required RBAC role on the target subscription or resource group.
    links:
      - url: "https://learn.microsoft.com/azure/role-based-access-control/role-assignments-portal"
        title: "Assign Azure roles"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "Forbidden"
    message: "Access to this resource is forbidden."
    suggestion: >
      You may lack the required RBAC role, or an Azure Policy is
      blocking the operation. Check your role assignments and any
      deny assignments or policies on the target scope.
    links:
      - url: "https://learn.microsoft.com/azure/role-based-access-control/troubleshooting"
        title: "Troubleshoot Azure RBAC"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "RequestDisallowedByPolicy"
    message: "An Azure Policy is blocking this deployment."
    suggestion: >
      Check which policies are assigned to your subscription or
      resource group with 'az policy assignment list'. Contact your
      administrator to add an exemption or adjust the policy.
    links:
      - url: "https://learn.microsoft.com/azure/governance/policy/troubleshoot/general"
        title: "Troubleshoot Azure Policy"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "RoleAssignmentExists"
    message: "A role assignment already exists for this identity."
    suggestion: >
      This is usually safe to ignore — the required permissions are
      already in place. If the deployment failed, retry and the
      existing role assignment will be reused.

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "PrincipalNotFound"
    message: "The security principal for a role assignment was not found."
    suggestion: >
      The user, group, or service principal may have been deleted.
      Check that the principal ID in your template is valid, or
      remove the stale role assignment.
    links:
      - url: "https://learn.microsoft.com/azure/role-based-access-control/troubleshooting"
        title: "Troubleshoot Azure RBAC"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "NoRegisteredProviderFound"
    message: "A required Azure resource provider is not registered."
    suggestion: >
      Register the missing provider with
      'az provider register --namespace <provider>'.
      Common providers: Microsoft.CognitiveServices,
      Microsoft.Search, Microsoft.App, Microsoft.ContainerRegistry.
    links:
      - url: "https://learn.microsoft.com/azure/azure-resource-manager/troubleshooting/error-register-resource-provider"
        title: "Resolve resource provider registration errors"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "InvalidTemplateDeployment"
    patterns:
      - "container app"
      - "containerapp"
    message: "The Container Apps deployment template is invalid."
    suggestion: >
      Check your Bicep/ARM template for Container Apps configuration errors.
      Common issues include invalid container image references, incorrect
      environment variable names, or unsupported regions.
    links:
      - url: "https://learn.microsoft.com/azure/container-apps/troubleshooting"
        title: "Troubleshoot Container Apps"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "InvalidTemplate"
    message: "The deployment template contains errors."
    suggestion: "Run 'azd provision --preview' to validate before deploying."

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "ValidationError"
    message: "The deployment failed validation."
    suggestion: >
      Check resource property values and API versions
      in your Bicep/Terraform files.

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "ResourceNotFound"
    message: "A referenced resource was not found."
    suggestion: >
      Check resource dependencies and deployment ordering
      in your template.

  # Bare Conflict — least specific ARM code rule, must be AFTER
  # Conflict + keyword rules above
  - errorType: "DeploymentErrorLine"
    properties:
      Code: "Conflict"
    message: "A resource with this name already exists or is in a conflicting state."
    suggestion: "Check for existing or soft-deleted resources in the Azure portal."

  # ============================================================================
  # Container App Errors
  # ~2.46% of all azd errors (~3,152 in 90-day analysis)
  # ============================================================================

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "ContainerAppSecretInvalid"
    message: "A secret referenced by the container app is missing or invalid."
    suggestion: >
      Check your secret definitions in the Bicep template. Ensure all
      secrets referenced by environment variables or ingress exist and
      have valid values.
    links:
      - url: "https://learn.microsoft.com/azure/container-apps/manage-secrets"
        title: "Manage secrets in Azure Container Apps"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "ContainerAppOperationError"
    patterns:
      - "image"
    message: "The container image could not be pulled."
    suggestion: >
      Verify the image name and tag, ensure the container registry
      is accessible, and check that registry credentials are configured
      correctly (admin enabled or managed identity assigned).
    links:
      - url: "https://learn.microsoft.com/azure/container-apps/containers"
        title: "Containers in Azure Container Apps"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "ContainerAppOperationError"
    message: "A Container Apps operation failed during deployment."
    suggestion: >-
      Check your container image is valid and accessible, verify your ingress and networking
      configuration, and ensure your scaling rules are correct.
      Run 'az containerapp revision list -g <resource-group> -n <app-name>' to check revision status,
      or inspect logs with 'az containerapp logs show --name <app> -g <resource-group> --follow'.
    links:
      - url: "https://learn.microsoft.com/azure/container-apps/troubleshooting"
        title: "Troubleshoot Azure Container Apps"

  - errorType: "DeploymentErrorLine"
    regex: true
    properties:
      Code: "InvalidParameterValueInContainerTemplate"
    message: "The container app template has an invalid parameter."
    suggestion: >
      Check container resource limits (CPU/memory), port
      configuration, and environment variable values in your template.
    links:
      - url: "https://learn.microsoft.com/azure/container-apps/containers"
        title: "Containers in Azure Container Apps"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "ContainerAppInvalidName"
    message: "The container app name is invalid."
    suggestion: >-
      Container app names must be 2-32 characters, start with a letter, and contain
      only lowercase letters, numbers, and hyphens. Update the name in your Bicep
      template or azure.yaml.
    links:
      - url: "https://learn.microsoft.com/azure/container-apps/environment"
        title: "Azure Container Apps environments"

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "ManagedEnvironmentNotReadyForAppCreation"
    message: "The Container Apps environment is not ready for app creation."
    suggestion: >-
      The managed environment is still provisioning or in a failed state. Wait a
      few minutes and retry, or check the environment status in the Azure portal.
      If the environment is in a failed state, delete and recreate it.

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "ManagedEnvironmentInvalidName"
    message: "The Container Apps managed environment name is invalid."
    suggestion: >-
      Environment names must be 1-60 characters and contain only lowercase letters,
      numbers, and hyphens. Update the environment name in your Bicep template.

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "InvalidEnvironmentId"
    message: "The Container Apps environment ID is invalid or not found."
    suggestion: >-
      Verify the environment resource ID in your Bicep template. Ensure the managed
      environment exists in the same subscription and region, or run 'azd provision'
      to create it.

  - errorType: "DeploymentErrorLine"
    properties:
      Code: "MaxNumberOfEnvsExceeded"
    message: "The maximum number of Container Apps environments has been reached."
    suggestion: >-
      Your subscription has reached the limit for managed environments in this region.
      Delete unused environments in the Azure portal, or deploy to a different region
      with 'azd env set AZURE_LOCATION <region>'.
    links:
      - url: "https://learn.microsoft.com/azure/container-apps/quotas"
        title: "Azure Container Apps quotas"

  # ============================================================================
  # PowerShell Hook Failures (errorType + properties + patterns)
  # ~5% of all azd errors (~6,347); AI templates hit 6.59%
  # ============================================================================

  - errorType: "ExitError"
    regex: true
    properties:
      Cmd: "(?i)pwsh|powershell"
    patterns:
      - "Import-Module"
      - "not loaded"
    message: "A required PowerShell module could not be loaded."
    suggestion: "Install the missing module with 'Install-Module <ModuleName> -Scope CurrentUser'."

  - errorType: "ExitError"
    regex: true
    properties:
      Cmd: "(?i)pwsh|powershell"
    patterns:
      - "(?i)Az\\.\\S+.*is not recognized"
    message: "The Azure PowerShell module (Az) is required but not installed."
    suggestion: "Install it with 'Install-Module Az -Scope CurrentUser -Repository PSGallery -Force'."
    links:
      - url: "https://learn.microsoft.com/powershell/azure/install-azure-powershell"
        title: "Install Azure PowerShell"

  - errorType: "ExitError"
    regex: true
    properties:
      Cmd: "(?i)pwsh|powershell"
    patterns:
      - "UnauthorizedAccess"
    message: "PowerShell execution policy is blocking the script."
    suggestion: >
      Check your policy with 'Get-ExecutionPolicy' and consider setting it with
      'Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser'.

  - errorType: "ExitError"
    regex: true
    properties:
      Cmd: "(?i)pwsh|powershell"
    patterns:
      - "ErrorActionPreference"
    message: "The hook script has an issue with error handling configuration."
    suggestion: "Ensure '$ErrorActionPreference = \"Stop\"' is set at the top of the script."

  - errorType: "ExitError"
    regex: true
    properties:
      Cmd: "(?i)pwsh|powershell"
    patterns:
      - "Connect-AzAccount"
    message: "The Azure authentication session may have expired."
    suggestion: "Run 'azd auth login' to refresh your credentials, then retry."

  - errorType: "ExitError"
    regex: true
    properties:
      Cmd: "(?i)pwsh|powershell"
    patterns:
      - "(?i)login.*expired|expired.*login"
    message: "The Azure authentication session may have expired."
    suggestion: "Run 'azd auth login' to refresh your credentials, then retry."

  # ============================================================================
  # Python Hook Failures
  # Language hooks (Phase 1: Python) — dependency and runtime errors
  # ============================================================================

  - patterns:
      - "python 3 is required to run this hook"
      - "python is not installed"
    message: "Python 3 is required to run a language hook but was not found."
    suggestion: "Install Python 3 from https://www.python.org/downloads/ and ensure it is on your PATH."
    links:
      - url: "https://www.python.org/downloads/"
        title: "Python Downloads"

  - patterns:
      - "creating python virtual environment"
      - "venv module"
    message: "Failed to create a Python virtual environment for a hook script."
    suggestion: >-
      Ensure Python 3.3+ is installed with the venv module. On Debian/Ubuntu,
      you may need to install it separately with 'sudo apt install python3-venv'.

  - patterns:
      - "installing python requirements"
      - "installing python project"
    message: "Failed to install Python dependencies for a hook script."
    suggestion: >-
      Check that your requirements.txt or pyproject.toml is valid and all packages
      are available. Run 'pip install -r requirements.txt' manually to diagnose the issue.

  - patterns:
      - "inline scripts are not supported for"
    message: "Inline scripts are only supported for shell hooks (sh, pwsh)."
    suggestion: >-
      Write your script to a file and set 'run' to the file path
      (e.g. run: ./hooks/my-script.py). Language hooks require a file path.

  # ============================================================================
  # Subscription Errors
  # ============================================================================

  - patterns:
      - "no subscriptions found"
      - "no subscription found"
    message: "No Azure subscriptions were found for your account."
    suggestion: >
      Ensure you have an active subscription at https://portal.azure.com.
      If you have multiple tenants, run 'azd auth login --tenant-id <tenant-id>'
      to sign in to a specific tenant. Multi-factor authentication (MFA) may prevent
      automatic access to all tenants — visit the Azure portal and switch to each tenant
      to refresh your MFA sessions, then retry 'azd auth login'.
    links:
      - url: "https://learn.microsoft.com/azure/developer/azure-developer-cli/reference#azd-auth-login"
        title: "azd auth login reference"

  # ============================================================================
  # Tool Missing Errors — Docker / Container Runtime
  # ============================================================================

  - errorType: "MissingToolErrors"
    patterns:
      - "is not running"
    message: "The container runtime (Docker/Podman) is not running."
    suggestion: >-
      Start your container runtime, or build on Azure instead by setting
      'remoteBuild: true' under the 'docker:' section for each service in azure.yaml.

  - errorType: "MissingToolErrors"
    patterns:
      - "Docker"
    message: "No container runtime (Docker/Podman) is installed."
    suggestion: >-
      If your services use Container Apps or AKS, you can build on Azure instead
      of locally. Set 'remoteBuild: true' under the 'docker:' section for each
      service in azure.yaml. Otherwise, install Docker or Podman.
    links:
      - url: "https://aka.ms/azure-dev/docker-install"
        title: "Install Docker"
      - url: "https://aka.ms/azure-dev/podman-install"
        title: "Install Podman"
      - url: "https://learn.microsoft.com/azure/developer/azure-developer-cli/azd-schema"
        title: "azure.yaml schema reference"

  # ============================================================================
  # Text Pattern Rules — Specific patterns first
  # These are fallbacks for errors without typed Go structs.
  # ============================================================================

  - patterns:
      - "parsing project file"
    message: "Your azure.yaml file is invalid."
    suggestion: "Check the syntax of your azure.yaml file and fix any errors."
    links:
      - url: "https://learn.microsoft.com/azure/developer/azure-developer-cli/azd-schema"
        title: "azure.yaml schema reference"

  - patterns:
      - "InvalidAuthenticationToken"
      - "ExpiredAuthenticationToken"
      - "TokenExpired"
    message: "Your authentication token has expired."
    suggestion: "Run 'azd auth login' to sign in again."
    links:
      - url: "https://learn.microsoft.com/azure/developer/azure-developer-cli/reference#azd-auth-login"
        title: "azd auth login reference"

  - regex: true
    patterns:
      - "BCP\\d{3}"
    message: "Your Bicep template has an error."
    suggestion: "Review the error message for the specific issue and line number in your .bicep file."
    links:
      - url: "https://learn.microsoft.com/azure/azure-resource-manager/bicep/bicep-error-codes"
        title: "Bicep error codes reference"

  # ============================================================================
  # Extension Registry Errors
  # ============================================================================

  - errorType: "ErrUnsupportedRegistrySchema"
    message: "The extension registry uses a schema version not supported by this version of azd."
    suggestion: "Upgrade azd to the latest version to use this registry."
    links:
      - url: "https://aka.ms/azd/install"
        title: "Install/upgrade azd"

  # ============================================================================
  # Text Pattern Rules — Broad/generic patterns (least specific, must be last)
  # ============================================================================

  - patterns:
      - "AADSTS"
    message: "Authentication with Azure failed."
    suggestion: "Run 'azd auth login' to sign in again."
    links:
      - url: "https://learn.microsoft.com/azure/developer/azure-developer-cli/reference#azd-auth-login"
        title: "azd auth login reference"

  - patterns:
      - "QuotaExceeded"
      - "quota exceeded"
      - "exceeds quota"
    message: "Your Azure subscription has reached a resource quota limit."
    suggestion: "Request a quota increase through the Azure portal, or try deploying to a different region."
    links:
      - url: "https://learn.microsoft.com/azure/quotas/quickstart-increase-quota-portal"
        title: "Increase Azure subscription quotas"
