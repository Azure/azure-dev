id: env-delete-001
description: >
  User wants to delete a dev environment and its Azure resources.
  LLM should suggest azd down to tear down resources first, then
  azd env delete to remove the local environment configuration.
inputs:
  prompt: "I no longer need my dev environment. How do I completely remove it and all its Azure resources?"
  context: "User has an azd project with a 'dev' environment that has provisioned Azure resources."
graders:
  - type: text
    weight: 0.3
    config:
      must_match:
        - "azd down"
        - "azd env delete"
      must_not_match:
        - "azd env new"
        - "azd init"
  - type: action_sequence
    weight: 0.4
    config:
      expected_order:
        - "azd down"
        - "azd env delete"
  - type: text
    weight: 0.3
    config:
      must_match_any:
        - "azd down -e dev"
        - "azd down --environment dev"
        - "azd env select dev"
