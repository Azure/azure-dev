            {
              "schemaVersion": "1.0",
              "extensions": [
                {
                  "id": "microsoft.azd.demo",
                  "namespace": "demo",
                  "displayName": "Demo Extension",
                  "description": "This extension provides examples of the azd extension framework.",
                  "versions": [
                    {
                      "version": "0.7.1-nightly.6609781",
                      "capabilities": [
                        "custom-commands",
                        "lifecycle-events",
                        "mcp-server",
                        "service-target-provider",
                        "framework-service-provider",
                        "provisioning-provider",
                        "validation-provider",
                        "metadata"
                      ],
                      "providers": [
                        {
                          "name": "demo",
                          "type": "service-target",
                          "description": "Deploys application components to demo"
                        },
                        {
                          "name": "demo",
                          "type": "provisioning-provider",
                          "description": "Provisions infrastructure using the demo provider"
                        }
                      ],
                      "usage": "azd demo <command> [options]",
                      "examples": [
                        {
                          "name": "context",
                          "description": "Displays the current `azd` project & environment context.",
                          "usage": "azd demo context"
                        },
