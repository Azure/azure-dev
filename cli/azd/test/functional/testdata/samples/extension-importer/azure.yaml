# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# This sample demonstrates combining an extension importer with a deployable service.
#
# The demo-importer extension generates infrastructure (Bicep) from resource definitions
# in the "demo-importer/" folder. The "app" service is a static web app deployed to
# Azure Static Web Apps — its infrastructure is generated by the importer.
#
# To override the default importer folder, use:
#   infra:
#     importer:
#       name: demo-importer
#       options:
#         path: custom-folder

name: extension-importer
infra:
  importer:
    name: demo-importer
services:
  app:
    host: staticwebapp
    language: js
    project: ./src/app
    dist: dist
