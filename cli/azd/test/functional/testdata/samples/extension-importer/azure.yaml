# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# This sample uses the demo-importer extension to generate infrastructure
# from .md resource definition files. The demo importer defaults to looking
# in a "demo-importer" folder. To override the path, add:
#
#   infra:
#     importer:
#       name: demo-importer
#       options:
#         path: custom-folder
#
name: extension-importer
infra:
  importer:
    name: demo-importer
