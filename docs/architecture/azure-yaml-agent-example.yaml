# Proposed azure.yaml shape — Unify Foundry agent configuration.
# Tracking issue: https://github.com/Azure/azure-dev/issues/7962
#
# Illustrative end-state, not a runnable template. It shows the two host kinds
# and how an agent references the project via `uses`.

name: my-foundry-agents

services:
  # ---------------------------------------------------------------------------
  # Project-scoped service: all Foundry data-plane resources in one place.
  # No source directory, no build artifact — pure declarative state.
  # `provision` creates the Foundry project (ARM); `deploy` creates/updates the
  # data-plane resources (deployments, connections, toolboxes) via Foundry APIs.
  # ---------------------------------------------------------------------------
  foundry-project:
    host: azure.ai.project
    config:
      deployments:
        - name: gpt-4.1-mini
          model:
            format: OpenAI
            name: gpt-4.1-mini
            version: "2025-04-14"
          sku:
            name: GlobalBatch
            capacity: 10
      connections:
        - name: github-mcp-conn
          category: CustomKeys
          target: https://api.githubcopilot.com/mcp
          authType: ApiKey
      toolboxes:
        agent-toolbox:
          tools:
            - { type: web_search }
            - { type: code_interpreter }
            - { type: mcp, connection: ${GITHUB_MCP_CONN} }

  # ---------------------------------------------------------------------------
  # Agent-scoped service: the agent runtime. References the project via `uses`.
  # Code-deploy mode: a `runtime:` block is present -> azd zips the project
  # directory and Foundry schedules it on the appropriate managed base image.
  # ---------------------------------------------------------------------------
  my-agent:
    project: src/my-agent
    host: azure.ai.agent
    uses: [foundry-project]
    runtime:
      stack: python
      version: "3.13"
    config:
      kind: hosted
      description: A basic agent hosted by Foundry.
      protocols:
        - { protocol: responses, version: 1.0.0 }
      # container.resources (cpu/memory) applies to ALL deploy modes, including
      # code-deploy — the Foundry create-agent API carries cpu/memory for both
      # code and container agents. Defaults apply when omitted (cpu: "1",
      # memory: "2Gi").
      container:
        resources: { cpu: "0.5", memory: 1Gi }
      env:
        AZURE_AI_MODEL_DEPLOYMENT_NAME: gpt-4.1-mini
      startupCommand: python main.py

  # ---------------------------------------------------------------------------
  # A second agent that wants the same toolbox is just another
  # `host: azure.ai.agent` entry with `uses: [foundry-project]` — nothing is
  # duplicated. The project service is the single source of truth for shared
  # resources.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Container mode variant (build from Dockerfile): replace the `runtime:` block
  # with a `docker:` block. `image:` / `docker:` / `runtime:` are mutually
  # exclusive; exactly one is required.
  # ---------------------------------------------------------------------------
  #
  #   my-agent:
  #     project: src/my-agent
  #     host: azure.ai.agent
  #     uses: [foundry-project]
  #     docker: { path: Dockerfile, remoteBuild: true }
  #     config:
  #       kind: hosted
  #       protocols:
  #         - { protocol: responses, version: 1.0.0 }
  #       container:
  #         resources: { cpu: "0.25", memory: 0.5Gi }
  #       env:
  #         AZURE_AI_MODEL_DEPLOYMENT_NAME: gpt-4.1-mini

  # ---------------------------------------------------------------------------
  # Existing image variant (no build, no zip): point `image:` at an
  # already-published container image (e.g. in ACR). azd skips package/publish
  # and Foundry pulls the image directly.
  # ---------------------------------------------------------------------------
  #
  #   my-agent:
  #     host: azure.ai.agent
  #     uses: [foundry-project]
  #     image: myregistry.azurecr.io/my-agent:v1
  #     config:
  #       kind: hosted
  #       protocols:
  #         - { protocol: responses, version: 1.0.0 }
  #       container:
  #         resources: { cpu: "0.25", memory: 0.5Gi }
  #       env:
  #         AZURE_AI_MODEL_DEPLOYMENT_NAME: gpt-4.1-mini

  # ===========================================================================
  # BROWNFIELD VARIANTS — using an existing Foundry project and/or model.
  #
  # NOTE: the `resourceId:` field below is introduced by the Bicep-less
  # provisioning RFC (https://github.com/Azure/azure-dev/issues/8065), i.e.
  # Phase 2. Its presence flips the project service to "existing project" mode:
  # the Foundry project ARM resource is omitted from the synthesized Bicep and
  # only referenced. Until Phase 2 lands, brownfield is handled via the
  # USE_EXISTING_AI_PROJECT / AZURE_AI_PROJECT_ID azd environment variables.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Brownfield A — existing project, reuse an existing model deployment.
  # `resourceId:` references the project (not created). No `deployments:` block:
  # the model already exists, so the agent just references its deployment name.
  # ---------------------------------------------------------------------------
  #
  #   foundry-project:
  #     host: azure.ai.project
  #     resourceId: ${AZURE_AI_PROJECT_ID}   # presence -> existing project mode
  #     config:
  #       # No deployments: — the model already exists in the project.
  #       toolboxes:
  #         agent-toolbox:
  #           tools:
  #             - { type: web_search }
  #
  #   my-agent:
  #     project: src/my-agent
  #     host: azure.ai.agent
  #     uses: [foundry-project]
  #     runtime: { stack: python, version: "3.13" }
  #     config:
  #       kind: hosted
  #       protocols:
  #         - { protocol: responses, version: 1.0.0 }
  #       env:
  #         AZURE_AI_MODEL_DEPLOYMENT_NAME: gpt-4.1-mini   # reference only
  #       startupCommand: python main.py

  # ---------------------------------------------------------------------------
  # Brownfield B — existing project, but create a NEW model deployment on it.
  # `resourceId:` references the project; the deployment under `config:` is still
  # synthesized (ARM-backed) against that existing project.
  # ---------------------------------------------------------------------------
  #
  #   foundry-project:
  #     host: azure.ai.project
  #     resourceId: ${AZURE_AI_PROJECT_ID}   # existing project
  #     config:
  #       deployments:                       # but this model is created by azd
  #         - name: gpt-4.1-mini2
  #           model: { format: OpenAI, name: gpt-4.1-mini, version: "2025-04-14" }
  #           sku: { name: Standard, capacity: 10 }

# No infra: block needed by default. azd provision uses built-in Bicep templates
# internally (like azd compose). Opt in to Bicep on disk via `azd infra gen` or
# equivalent (separate RFC).
