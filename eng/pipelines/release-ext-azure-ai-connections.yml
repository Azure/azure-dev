# Continuous deployment trigger
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - go.mod
      - cli/azd/extensions/azure.ai.connections
      - eng/pipelines/release-azd-extension.yml
      - /eng/pipelines/templates/jobs/build-azd-extension.yml
      - /eng/pipelines/templates/jobs/cross-build-azd-extension.yml
      - /eng/pipelines/templates/variables/image.yml

pr:
  paths:
    include:
      - cli/azd/extensions/azure.ai.connections
      - eng/pipelines/release-ext-azure-ai-connections.yml
      - eng/pipelines/release-azd-extension.yml
      - eng/pipelines/templates/steps/publish-cli.yml
    exclude:
      - cli/azd/docs/**

parameters:
  - name: PublishToRegistry
    displayName: Publish to registry
    type: string
    ${{ if eq(variables['Build.Reason'], 'Schedule') }}:
      default: nightly
    ${{ else }}:
      default: stable
    values:
      - stable
      - dev
      - nightly

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    stages:
      - template: /eng/pipelines/templates/stages/release-azd-extension.yml
        parameters: 
          AzdExtensionId: azure.ai.connections
          SanitizedExtensionId: azure-ai-connections
          AzdExtensionDirectory: cli/azd/extensions/azure.ai.connections
          PublishToRegistry: ${{ parameters.PublishToRegistry }}
