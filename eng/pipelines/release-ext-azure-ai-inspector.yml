# Continuous deployment trigger
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - cli/azd/extensions/azure.ai.inspector
      - /eng/pipelines/templates/stages/release-azd-extension.yml
      - /eng/pipelines/templates/jobs/build-azd-extension.yml
      - /eng/pipelines/templates/jobs/cross-build-azd-extension.yml
      - /eng/pipelines/templates/variables/image.yml

pr:
  paths:
    include:
      - cli/azd/extensions/azure.ai.inspector
      - eng/pipelines/release-ext-azure-ai-inspector.yml
      - /eng/pipelines/templates/stages/release-azd-extension.yml
      - eng/pipelines/templates/steps/publish-cli.yml
    exclude:
      - cli/azd/docs/**

parameters:
  - name: PublishToRegistry
    displayName: Publish to registry
    type: string
    # Scheduled (nightly) runs override this in the shared templates; the runtime
    # parameter default must be a literal because it renders before variables exist.
    default: stable
    values:
      - stable
      - dev
      - nightly

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    stages:
      - template: /eng/pipelines/templates/stages/release-azd-extension.yml
        parameters: 
          AzdExtensionId: azure.ai.inspector
          SanitizedExtensionId: azure-ai-inspector
          AzdExtensionDirectory: cli/azd/extensions/azure.ai.inspector
          PublishToRegistry: ${{ parameters.PublishToRegistry }}
