parameters:
  - name: NameSuffix
    type: string
  - name: Pool
    type: string
  - name: ImageKey
    type: string  
    default: image
  - name: OSVmImage
    type: string
  - name: OS
    type: string
  - name: Variables
    type: object

jobs:
  - job: Build_${{ parameters.NameSuffix }}
    displayName: Build ${{ parameters.NameSuffix }}

    pool:
      name: ${{ parameters.Pool }}
      ${{ parameters.ImageKey }}: ${{ parameters.OSVmImage }}
      os: ${{ parameters.OS }}

    variables:
      # TODO: What version of Node to use for Azure DevOps extension build?
      NodeVersion: 20.x
      # The azdo-extension build currently fails on the self-hosted Linux/Windows
      # agents because they cannot reach registry.npmjs.org (npm EPERM egress
      # block); `npm i -g npm` fails before any dependency is resolved. Build Mac
      # (hosted pool) and the vscode build (same pool) are unaffected, so this is
      # an agent egress issue, not a code problem. Until it is fixed, the
      # npm-dependent steps below are made non-blocking for PR validation builds
      # only, so this gate does not block unrelated PRs. Release/CD builds on
      # `main` remain strict, so CodeQL and artifact generation are unaffected.
      # Tracking issue: https://github.com/Azure/azure-dev/issues/9286
      ${{ insert }}: ${{ parameters.Variables }}

    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: $(NodeVersion)

      - pwsh: |
          npm i -g npm tfx-cli
          npm ci
        displayName: Install build tools and dependencies
        workingDirectory: ext/azuredevops/setupAzd
        # Non-blocking on PR builds only (see issue #9286).
        continueOnError: ${{ eq(variables['Build.Reason'], 'PullRequest') }}

      # TODO: If private build, update vss-extension.json and other JSONs to 
      # set a dev version

      - task: PowerShell@2
        inputs:
          targetType: 'filePath'
          filePath: '$(Build.SourcesDirectory)/ext/azuredevops/ci-test.ps1'
          workingDirectory: '$(Build.SourcesDirectory)/ext/azuredevops'
        displayName: Test
        # Non-blocking on PR builds only (see issue #9286).
        continueOnError: ${{ eq(variables['Build.Reason'], 'PullRequest') }}

      - task: PowerShell@2
        inputs:
          targetType: 'filePath'
          filePath: '$(Build.SourcesDirectory)/ext/azuredevops/ci-package.ps1'
          workingDirectory: '$(Build.SourcesDirectory)/ext/azuredevops'
        displayName: Package Extension
        # Non-blocking on PR builds only (see issue #9286).
        continueOnError: ${{ eq(variables['Build.Reason'], 'PullRequest') }}

      - pwsh: |
          Copy-Item `
            -Path "$(Build.SourcesDirectory)/ext/azuredevops/*.vsix" `
            -Destination "$(Build.ArtifactStagingDirectory)/"
        # Skip artifact staging on PR builds: the package step may not produce a
        # VSIX while the npm egress issue (#9286) persists.
        condition: and(succeeded(), eq('true', variables['UploadArtifact']), ne(variables['Build.Reason'], 'PullRequest'))
        displayName: Copy VSIX to staging directory

    templateContext:
      outputs:
        - output: pipelineArtifact
          path: $(Build.ArtifactStagingDirectory)
          condition: and(succeeded(), eq('true', variables['UploadArtifact']), ne(variables['Build.Reason'], 'PullRequest'))
          artifact: vsix
