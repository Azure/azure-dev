parameters:
  - name: DownloadArtifacts
    type: object
    default:
      - cover-win
      - cover-lin
      - cover-mac
  - name: MinimumCoveragePercent
    type: number
    default: 0
  - name: PackageCoverageDecreaseTolerance
    # Maximum tolerated per-package coverage decrease (percentage points) on PRs.
    # The PR fails when any single package's coverage drops by more than this
    # many pp from the baseline. Scoped to PR-touched packages when changed
    # files can be resolved; otherwise applies to all packages. Set to -1 to
    # disable both this gate and the absolute-floor gate (advisory output only).
    type: number
    default: 0.5
  - name: MinimumOverallCoverage
    # Absolute floor for overall coverage on PRs. The PR fails when current
    # overall coverage is below this percentage, regardless of baseline.
    type: number
    default: 65
  - name: MaxPackageTestSeconds
    type: number
    default: 0
  - name: MaxTotalTestSeconds
    type: number
    default: 0
stages: 
- stage: CodeCoverage_Upload
  condition: and(succeeded(), ne(variables['Skip.LiveTest'], 'true'))
  dependsOn: BuildAndTest

  variables:
    - template: /eng/pipelines/templates/variables/globals.yml
    - template: /eng/pipelines/templates/variables/image.yml

  jobs:
  - job: Upload
    pool:
      name: $(LINUXPOOL)
      image: $(LINUXVMIMAGE)
      os: linux
    steps:
      - template: /eng/pipelines/templates/steps/setup-go.yml
      - template: /eng/pipelines/templates/steps/download-artifacts.yml
        parameters:
          Artifacts: ${{ parameters.DownloadArtifacts }}

      - pwsh: |
          New-Item -ItemType Directory -Force -Path cover
          New-Item -ItemType Directory -Force -Path cover-int
          New-Item -ItemType Directory -Force -Path cover-unit

          $unitCoverage = (Get-ChildItem cover-*/unit).FullName -join ","
          $integrationCoverage = (Get-ChildItem cover-*/int).FullName -join ","

          # Merge platform coverage and emit cover.out via the shared mage
          # target so CI uses the same coverage reporting plumbing as
          # `mage coverage:ci` does locally — avoids a second source of truth.
          Push-Location $(Build.SourcesDirectory)/cli/azd
          try {
              $env:COVERAGE_REPORT_UNIT_INPUTS = $unitCoverage
              $env:COVERAGE_REPORT_INT_INPUTS = $integrationCoverage
              $env:COVERAGE_REPORT_OUTPUT = "$(Build.SourcesDirectory)/cover.out"
              $env:COVERAGE_REPORT_MERGED_DIR = "$(Build.SourcesDirectory)/cover"
              mage coverage:report
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
              Pop-Location
          }

          # Filter generated code (e.g. protobuf *.pb.go) from coverage profile
          # so that coverage percentages reflect only hand-written source code.
          Write-Host "Filtering generated code from coverage profile..."
          pwsh -File "$(Build.SourcesDirectory)/eng/scripts/Filter-GeneratedCoverage.ps1" -CoverageFile cover.out
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Convert Go coverage to Cobertura XML format using custom script
          Write-Host "Converting coverage to Cobertura XML format..."
          pwsh -File "$(Build.SourcesDirectory)/eng/scripts/Convert-GoCoverageToCobertura.ps1" -CoverageFile cover.out -OutputFile coverage.xml -SourceRoot "$(Build.SourcesDirectory)"
          if ($LASTEXITCODE -ne 0) { 
              Write-Error "Failed to convert coverage to XML"
              exit $LASTEXITCODE 
          }
        displayName: Merge code coverage files

      - ${{ if gt(parameters.MinimumCoveragePercent, 0) }}:
        - task: PowerShell@2
          inputs:
            pwsh: true
            targetType: filePath
            filePath: $(Build.SourcesDirectory)/eng/scripts/Test-CodeCoverageThreshold.ps1
            arguments: -CoverageFile $(Build.SourcesDirectory)/cover.out -MinimumCoveragePercent ${{ parameters.MinimumCoveragePercent }}
            workingDirectory: $(Build.SourcesDirectory)/cli/azd
          displayName: Check code coverage threshold

      - task: PublishCodeCoverageResults@2
        condition: succeededOrFailed()
        inputs:
          summaryFileLocation: '$(Build.SourcesDirectory)/**/coverage.xml'
          pathToSources: '$(Build.SourcesDirectory)'
        displayName: Publish Code Coverage to DevOps

      - pwsh: |
          # Collect and analyze test timing from all platform artifacts
          $timingFiles = @(Get-ChildItem cover-*/test-timing-unit.json -ErrorAction SilentlyContinue)
          if (-not $timingFiles -or $timingFiles.Count -eq 0) {
              Write-Host "No test timing files found. Skipping timing analysis."
              exit 0
          }

          # Use the Linux timing file as the canonical source (most consistent CI environment)
          $timingFile = $timingFiles | Where-Object { $_.FullName -match 'cover-lin' } | Select-Object -First 1
          if (-not $timingFile) {
              $timingFile = $timingFiles | Select-Object -First 1
          }

          Write-Host "Analyzing test timing from: $($timingFile.FullName)"
          $timingArgs = @(
              '-File', "$(Build.SourcesDirectory)/eng/scripts/Test-TestTiming.ps1",
              '-JsonFile', $timingFile.FullName,
              '-Top', '30'
          )

          if (${{ parameters.MaxPackageTestSeconds }} -gt 0) {
              $timingArgs += @('-MaxPackageSeconds', '${{ parameters.MaxPackageTestSeconds }}')
          }
          if (${{ parameters.MaxTotalTestSeconds }} -gt 0) {
              $timingArgs += @('-MaxTotalSeconds', '${{ parameters.MaxTotalTestSeconds }}')
          }

          pwsh @timingArgs
        displayName: Analyze test timing
        condition: succeededOrFailed()

      - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
        - pwsh: |
            $ErrorActionPreference = 'Stop'

            # ---------------------------------------------------------------
            # Download main branch baseline coverage for comparison
            # ---------------------------------------------------------------
            $adoOrg = '$(System.CollectionUri)'.TrimEnd('/')
            $adoProject = '$(System.TeamProjectId)'
            $pipelineId = '$(System.DefinitionId)'

            if ([string]::IsNullOrWhiteSpace($env:SYSTEM_ACCESSTOKEN)) {
                Write-Warning "SYSTEM_ACCESSTOKEN is not available. Skipping coverage diff."
                exit 0
            }

            $headers = @{ Authorization = "Bearer $env:SYSTEM_ACCESSTOKEN" }

            Write-Host "Finding latest successful main build for baseline..."
            $buildsUrl = "$adoOrg/$adoProject/_apis/build/builds?" +
                "definitions=$pipelineId&branchName=refs/heads/main" +
                "&resultFilter=succeeded&`$top=1&api-version=7.1"

            try {
                $buildsResp = Invoke-RestMethod -Uri $buildsUrl -Headers $headers -Method Get
            }
            catch {
                Write-Warning "Failed to query main build baseline. Skipping coverage diff. $($_.Exception.Message)"
                exit 0
            }

            if ($buildsResp.count -eq 0) {
                Write-Warning "No successful main builds found. Skipping coverage diff."
                exit 0
            }

            $mainBuildId = $buildsResp.value[0].id
            $mainBuildNum = $buildsResp.value[0].buildNumber
            $mainCommit = $buildsResp.value[0].sourceVersion
            $shortCommit = if ($mainCommit) { $mainCommit.Substring(0, [math]::Min(8, $mainCommit.Length)) } else { 'unknown' }
            Write-Host "Using main build $mainBuildId ($mainBuildNum) commit $shortCommit for baseline"

            # Download and merge main build coverage artifacts
            New-Item -ItemType Directory -Force -Path baseline-tmp | Out-Null

            foreach ($artifactName in @('cover-unit', 'cover-int')) {
                $url = "$adoOrg/$adoProject/_apis/build/builds/$mainBuildId/artifacts?artifactName=$artifactName&api-version=7.1"
                try {
                    $resp = Invoke-RestMethod -Uri $url -Headers $headers -Method Get
                } catch {
                    Write-Warning "Failed to download $artifactName from main build: $_"
                    exit 0
                }
                $dlUrl = $resp.resource.downloadUrl
                Invoke-WebRequest -Uri $dlUrl -Headers $headers -OutFile "baseline-tmp/$artifactName.zip"
                Expand-Archive -Path "baseline-tmp/$artifactName.zip" -DestinationPath "baseline-tmp/$artifactName" -Force
                Remove-Item "baseline-tmp/$artifactName.zip"
            }

            # Resolve nested artifact paths (pipeline artifacts nest under artifact name).
            # Convert to absolute paths BEFORE Push-Location so `mage coverage:report`
            # (which runs with cwd = cli/azd) can still find the inputs.
            $unitPath = (Resolve-Path "baseline-tmp/cover-unit/cover-unit" -ErrorAction SilentlyContinue) `
                ?? (Resolve-Path "baseline-tmp/cover-unit" -ErrorAction SilentlyContinue)
            $intPath = (Resolve-Path "baseline-tmp/cover-int/cover-int" -ErrorAction SilentlyContinue) `
                ?? (Resolve-Path "baseline-tmp/cover-int" -ErrorAction SilentlyContinue)
            if (-not $unitPath -or -not $intPath) {
                Write-Host "##vso[task.logissue type=error]Baseline artifact layout unexpected: unit=$unitPath int=$intPath"
                exit 1
            }
            $unitPath = $unitPath.Path
            $intPath = $intPath.Path

            New-Item -ItemType Directory -Force -Path baseline-merged | Out-Null
            Push-Location $(Build.SourcesDirectory)/cli/azd
            try {
                $env:COVERAGE_REPORT_UNIT_INPUTS = $unitPath
                $env:COVERAGE_REPORT_INT_INPUTS = $intPath
                $env:COVERAGE_REPORT_OUTPUT = "$(Build.SourcesDirectory)/cover-baseline.out"
                $env:COVERAGE_REPORT_MERGED_DIR = "$(Build.SourcesDirectory)/baseline-merged"
                mage coverage:report
                if ($LASTEXITCODE -ne 0) {
                    Write-Host "##vso[task.logissue type=error]Failed to merge baseline coverage (mage coverage:report exit $LASTEXITCODE). Cannot run PR coverage diff."
                    exit 1
                }
            } finally {
                Pop-Location
            }

            # Filter generated code from baseline (same as current)
            $filterScript = "$(Build.SourcesDirectory)/eng/scripts/Filter-GeneratedCoverage.ps1"
            if (Test-Path $filterScript) {
                pwsh -NoProfile -NonInteractive -File $filterScript -CoverageFile cover-baseline.out
            }

            # ---------------------------------------------------------------
            # Resolve PR-changed files via `git diff` against the PR target
            # branch. The triple-dot syntax `base...HEAD` implicitly uses the
            # merge-base, so we don't need a separate `git merge-base` call.
            # The list scopes the per-package report and per-package gate to
            # packages that contain a touched file. If diff resolution fails
            # (shallow clone, missing remote ref, etc.) we fall back to
            # package mode (full scan of every package) — fail closed, never
            # silently disable the per-package gate.
            # ---------------------------------------------------------------
            $changedFilesPath = "changed-files.txt"
            $changedFilesResolved = $false

            $packageTolerance = ${{ parameters.PackageCoverageDecreaseTolerance }}
            $minOverall = ${{ parameters.MinimumOverallCoverage }}

            $targetRef = $env:SYSTEM_PULLREQUEST_TARGETBRANCH
            $targetBranch = if ($targetRef) { $targetRef -replace '^refs/heads/', '' } else { 'main' }

            Write-Host "Fetching target branch for changed-file resolution: $targetBranch"
            git fetch --no-tags origin "+refs/heads/${targetBranch}:refs/remotes/origin/${targetBranch}" --depth=200 2>&1 | Write-Host

            # `git diff base...HEAD` does its own merge-base resolution; if the
            # remote ref or merge-base isn't reachable, this fails non-zero.
            $diffOutput = git diff --name-only --diff-filter=AMR "origin/${targetBranch}...HEAD" 2>&1
            if ($LASTEXITCODE -eq 0) {
                # Empty output is a valid result (docs-only PR, no Go changes);
                # mark as resolved so the per-package gate scopes to "none".
                Set-Content -Path $changedFilesPath -Value ($diffOutput -join "`n") -Encoding UTF8
                $changedFilesResolved = $true
            } else {
                Write-Warning "git diff against origin/$targetBranch failed: $diffOutput — falling back to package mode (full per-package scan)."
            }

            $changedCount = if ($changedFilesResolved -and (Test-Path $changedFilesPath)) {
                @(Get-Content $changedFilesPath | Where-Object { $_ -match '\S' }).Count
            } else { 0 }
            Write-Host "Changed files for coverage report scope: $changedCount (resolved=$changedFilesResolved)"

            # ---------------------------------------------------------------
            # Generate plain-text coverage report (logged inline) and fail
            # the stage on either gate breach: overall coverage below the
            # absolute floor, or any PR-touched package dropping beyond the
            # per-package tolerance.
            # ---------------------------------------------------------------
            $diffArgs = @(
                '-NoProfile', '-NonInteractive',
                '-File', "$(Build.SourcesDirectory)/eng/scripts/Get-CoverageDiff.ps1",
                '-BaselineFile', 'cover-baseline.out',
                '-CurrentFile',  'cover.out',
                '-BaselineLabel', "main build $mainBuildNum / commit $shortCommit"
            )

            # Pass the changed-files list ONLY when git diff resolution
            # succeeded. On failure we omit -ChangedFilesFromFile so the
            # script falls into package mode (full per-package scan) instead
            # of receiving an empty list (which would silently scope the
            # per-package gate to zero packages → false negative).
            if ($changedFilesResolved) {
                $diffArgs += @('-ChangedFilesFromFile', $changedFilesPath)
            }

            if ($packageTolerance -ge 0) {
                $diffArgs += @(
                    '-MaxPackageDecrease', $packageTolerance,
                    '-MinOverallCoverage', $minOverall,
                    '-FailOnGate'
                )
            }
            # PackageCoverageDecreaseTolerance < 0 disables BOTH gates (advisory output only).

            pwsh @diffArgs
            $diffExit = $LASTEXITCODE
            Write-Host ""
            Write-Host "Get-CoverageDiff.ps1 exit code: $diffExit"
            if ($diffExit -eq 2) {
                # Gate breach (per-package decrease and/or absolute-floor):
                # Get-CoverageDiff.ps1 already emitted ##vso[task.logissue]
                # entries for each breached gate. Just propagate the exit code
                # without duplicating the annotation.
                exit 2
            }
            if ($diffExit -ne 0) {
                Write-Host "##vso[task.logissue type=error]Coverage diff failed with exit code $diffExit. See log above."
                exit $diffExit
            }
          displayName: PR coverage diff (fail on per-package decrease or floor breach)
          condition: succeeded()
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)
            GH_TOKEN: $(GitHubToken)
    
    templateContext: 
      outputs: 
        - output: pipelineArtifact
          path: cover-unit
          artifact: cover-unit
          displayName: Upload unit test code coverage

        - output: pipelineArtifact
          path: cover-int
          artifact: cover-int
          displayName: Upload integration test code coverage
