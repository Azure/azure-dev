parameters:
  - name: SanitizedExtensionId
    type: string
  - name: AzdExtensionId
    type: string

stages:
  - stage: PublishDaily
    dependsOn: Sign
    condition: >-
      and(
        succeeded(),
        ne(variables['Skip.Release'], 'true'),
        or(
          in(variables['BuildReasonOverride'], 'IndividualCI', 'BatchedCI'),
          and(
            eq('', variables['BuildReasonOverride']),
            in(variables['Build.Reason'], 'IndividualCI', 'BatchedCI')
          )
        )
      )

    variables:
      - template: /eng/pipelines/templates/variables/image.yml
      - template: /eng/pipelines/templates/variables/globals.yml

    jobs:
      - deployment: Publish_Daily
        environment: none

        pool:
          name: azsdk-pool
          image: ubuntu-22.04
          os: linux

        templateContext:
          type: releaseJob
          isProduction: false
          inputs:
            - input: pipelineArtifact
              artifactName: release
              targetPath: release
            - input: pipelineArtifact
              artifactName: release-metadata
              targetPath: release-metadata

        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: /eng/pipelines/templates/steps/extension-set-metadata-variables.yml
                  parameters:
                    Use1ESArtifactTask: true

                - template: /eng/pipelines/templates/steps/publish-extension.yml
                  parameters:
                    PublishUploadLocations: ${{ parameters.SanitizedExtensionId }}/daily;${{ parameters.SanitizedExtensionId }}/daily/archive/$(EXT_VERSION)
                    CreateGitHubRelease: false

                - task: PowerShell@2
                  displayName: Generate daily registry entry
                  inputs:
                    pwsh: true
                    targetType: filePath
                    filePath: eng/scripts/Update-ExtensionDailyRegistry.ps1
                    arguments: >-
                      -SanitizedExtensionId "${{ parameters.SanitizedExtensionId }}"
                      -AzdExtensionId "${{ parameters.AzdExtensionId }}"
                      -Version "$(EXT_VERSION)"
                      -StorageBaseUrl "$(publish-storage-static-host)/azd/extensions/${{ parameters.SanitizedExtensionId }}/daily"
                      -OutputPath "$(Pipeline.Workspace)/registry-entry/${{ parameters.AzdExtensionId }}.json"
                      -TemplatePath "eng/templates/extensions-registry-daily.json.template"
                      -ReleasePath "$(Pipeline.Workspace)/release"
                      -ExtensionYamlPath "$(Pipeline.Workspace)/release-metadata/extension.yaml"

                - task: AzurePowerShell@5
                  displayName: Upload daily registry entry
                  inputs:
                    azureSubscription: 'Azure SDK Artifacts'
                    azurePowerShellVersion: LatestVersion
                    pwsh: true
                    ScriptType: InlineScript
                    Inline: |
                      $entryFile = "$(Pipeline.Workspace)/registry-entry/${{ parameters.AzdExtensionId }}.json"
                      $blobPath = "$(publish-storage-location)/`$web/azd/extensions/daily-registry-entries/${{ parameters.AzdExtensionId }}.json"
                      $maxRetries = 3
                      for ($i = 1; $i -le $maxRetries; $i++) {
                        azcopy copy $entryFile $blobPath --overwrite=true
                        if ($LASTEXITCODE -eq 0) { break }
                        if ($i -eq $maxRetries) {
                          Write-Error "Failed to upload registry entry after $maxRetries attempts (exit code $LASTEXITCODE)"
                          exit 1
                        }
                        Write-Host "Upload attempt $i failed, retrying in $($i * 5)s..."
                        Start-Sleep -Seconds ($i * 5)
                      }
                      Write-Host "Registry entry uploaded to $blobPath"
                  env:
                    AZCOPY_AUTO_LOGIN_TYPE: 'PSCRED'
