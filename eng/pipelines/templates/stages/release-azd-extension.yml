parameters:
  - name: AzdExtensionId
    type: string
  - name: AzdExtensionDirectory
    type: string
  - name: SanitizedExtensionId
    type: string
  - name: SkipTests
    type: boolean
    default: false
  - name: PublishToDevRegistry
    type: boolean
    default: false
  # When true the release publishes to the nightly registry and is allowed to run on a schedule.
  - name: IsNightly
    type: boolean
    default: false
  # StageSuffix is forwarded to every child stage template so this whole build/sign/publish chain can
  # be instantiated once per extension via an ${{ each }} loop in a single pipeline (e.g. the nightly
  # bundle). Defaults to '' so existing single-extension pipelines are unaffected.
  - name: StageSuffix
    type: string
    default: ''

stages: 
  - template: /eng/pipelines/templates/stages/build-and-test-azd-extension.yml
    parameters:
      StageSuffix: ${{ parameters.StageSuffix }}
      AzdExtensionId: ${{ parameters.AzdExtensionId }}
      AzdExtensionDirectory: ${{ parameters.AzdExtensionDirectory }}
      SkipTests: ${{ parameters.SkipTests }}
      BuildMatrix:
        Windows:
          Pool: $(WINDOWSPOOL)
          OSVmImage: $(WINDOWSVMIMAGE)
          OS: windows
          ImageKey: image
          UploadArtifact: true
          Variables:
            BuildTarget: ${{ parameters.SanitizedExtensionId }}-windows-amd64.exe
            BuildOutputName: ${{ parameters.SanitizedExtensionId }}-windows-amd64.exe
            AZURE_DEV_CI_OS: win
            Codeql.Enabled: true
            Codeql.SkipTaskAutoInjection: false
            Codeql.BuildIdentifier: cli_windows
        Linux:
          Pool: $(LINUXPOOL)
          OSVmImage: $(LINUXVMIMAGE)
          OS: linux
          ImageKey: image
          UploadArtifact: true
          Variables:
            BuildTarget: ${{ parameters.SanitizedExtensionId }}-linux-amd64
            BuildOutputName: ${{ parameters.SanitizedExtensionId }}-linux-amd64
            SetExecutableBit: true
            SetShieldInfo: true
            BuildLinuxPackages: true
            AZURE_DEV_CI_OS: lin
            Codeql.Enabled: true
            Codeql.SkipTaskAutoInjection: false
            Codeql.BuildIdentifier: cli_linux
        Mac:
          Pool: Azure Pipelines
          OSVmImage: $(MACVMIMAGE)
          OS: macOS
          ImageKey: vmImage
          UploadArtifact: true
          Variables:
            BuildTarget: ${{ parameters.SanitizedExtensionId }}-darwin-amd64
            BuildOutputName: ${{ parameters.SanitizedExtensionId }}-darwin-amd64
            MacLocalSign: false
            SetExecutableBit: true
            AZURE_DEV_CI_OS: mac
            # CodeQL on macOS not supported by the Azure DevOps task as-of current.
            # Codeql.BuildIdentifier: cli_darwin

        ${{ if eq(variables['Build.Reason'], 'Schedule') }}:
          # Only run this build during scheduled pipeline executions
          MacAppleSilicon:
            Pool: Azure Pipelines
            OSVmImage: $(MACVMIMAGEM1)
            OS: macOS
            ImageKey: vmImage
            UploadArtifact: false
            Variables:
              BuildTarget: ${{ parameters.SanitizedExtensionId }}-darwin-amd64
              BuildOutputName: ${{ parameters.SanitizedExtensionId }}-darwin-amd64
              MacLocalSign: false
              SetExecutableBit: true
              AZURE_DEV_CI_OS: mac-arm64

  # Only sign and release on manual builds from internal, or scheduled nightly builds from internal.
  - ${{ if and(eq(variables['System.TeamProject'], 'internal'), or(eq(variables['Build.Reason'], 'Manual'), and(eq(parameters.IsNightly, true), eq(variables['Build.Reason'], 'Schedule')))) }}:
    - template: /eng/pipelines/templates/stages/sign-extension.yml
      parameters:
        SanitizedExtensionId: ${{ parameters.SanitizedExtensionId }}
        StageSuffix: ${{ parameters.StageSuffix }}

    - template: /eng/pipelines/templates/stages/publish-extension.yml
      parameters:
        AzdExtensionId: ${{ parameters.AzdExtensionId }}
        AzdExtensionDirectory: ${{ parameters.AzdExtensionDirectory }}
        SanitizedExtensionId: ${{ parameters.SanitizedExtensionId }}
        PublishToDevRegistry: ${{ parameters.PublishToDevRegistry }}
        IsNightly: ${{ parameters.IsNightly }}
        StageSuffix: ${{ parameters.StageSuffix }}
