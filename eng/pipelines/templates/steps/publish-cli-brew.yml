parameters:
  - name: BaseRepoBranch
    type: string
    default: main

steps: 
  - task: DownloadPipelineArtifact@2
    inputs:
      artifactName: homebrew-formula
      targetPath: homebrew-formula

  - pwsh: git clone https://github.com/Azure/homebrew-azd
    displayName: Clone Azure/homebrew-azd

  - pwsh: |
      # Ensure directory exists
      New-Item -ItemType Directory homebrew-formula/Formula -Force
      New-Item -ItemType Directory homebrew-formula/Cask -Force

      # Copy updated formula and casks if they exist
      Copy-Item homebrew-formula/Formula/*.rb homebrew-azd/Formula/ -Force
      Copy-Item homebrew-formula/Cask/*.rb homebrew-azd/Cask/ -Force
    displayName: Copy updated formula and casks to homebrew-azd

  - template: /eng/common/pipelines/templates/steps/git-push-changes.yml
    parameters:
      # The azure-sdk user has permission to push directly to main
      BaseRepoBranch: ${{ parameters.BaseRepoBranch }}
      BaseRepoOwner: Azure
      CommitMsg: Update formula for azd release $(CLI_VERSION)
      TargetRepoName: homebrew-azd
      WorkingDirectory: homebrew-azd
