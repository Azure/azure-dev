parameters:
  CreateGitHubRelease: true
  PublishUploadLocations:
  UploadInstaller: false
  StorageContainerName: '`$web'

steps:
  - ${{ if eq('true', parameters.CreateGitHubRelease) }}:
    # This step must run first because a duplicated tag means we don't need to
    # continue with any of the subsequent steps.
    - pwsh: |
        $tag = "azure-dev-cli_$(CLI_VERSION)"
        Write-Host "Release tag: $tag"

        # Check for tag using gh API
        $existingTag = gh api /repos/$(Build.Repository.Name)/tags | ConvertFrom-Json | Where-Object { $_.name -eq $tag }
        if ($existingTag) {
            Write-Host "Tag $tag already exists. Exiting."
            exit 1
        }

        gh release view $tag --repo $(Build.Repository.Name)
        if ($LASTEXITCODE -eq 0) {
          Write-Host "Release ($tag) already exists. Exiting."
          exit 1
        }

        Write-Host "##vso[task.setvariable variable=GH_RELEASE_TAG;]$tag"

        # Exit with 0 (otherwise $LASTEXITCODE will not be 0 and the pipeline
        # will fail)
        exit 0
      displayName: Check for existing GitHub release
      env:
        GH_TOKEN: $(azuresdk-github-pat)

    - pwsh: |
        Remove-Item -Path release/_manifest -Recurse -Force
        Write-Host "Release:"
        Get-ChildItem -Recurse release/ | Select-Object -Property Length,FullName 
      displayName: Remove _manifest folder from release

    - pwsh: |
        gh release create `
          "$(GH_RELEASE_TAG)" `
          --title "$(GH_RELEASE_TAG)" `
          --notes-file changelog/CHANGELOG.md `
          --repo $(Build.Repository.Name)

        gh release upload $(GH_RELEASE_TAG) release/* --repo $(Build.Repository.Name)
      displayName: Create GitHub Release and upload artifacts
      env:
        GH_TOKEN: $(azuresdk-github-pat)

    - pwsh: |
        $goModuleTag = "cli/azd/v$(CLI_VERSION)"
        Write-Host "Go module tag: $goModuleTag"

        # Check if the Go module tag already exists (idempotent for re-runs)
        $existingRefs = @(
          gh api "repos/$(Build.Repository.Name)/git/matching-refs/tags/$goModuleTag" |
            ConvertFrom-Json
        )
        $exactMatch = $existingRefs | Where-Object { $_.ref -eq "refs/tags/$goModuleTag" }
        if ($exactMatch) {
          Write-Host "Tag $goModuleTag already exists. Skipping."
          exit 0
        }

        # Resolve the commit SHA from the release tag created in the previous step.
        # This ensures both tags always point to the same commit, even if new
        # commits landed between the build trigger and the publish stage.
        $tagRef = gh api "repos/$(Build.Repository.Name)/git/ref/tags/$(GH_RELEASE_TAG)" |
          ConvertFrom-Json
        $sha = $tagRef.object.sha

        if (-not $sha) {
          Write-Error "Failed to resolve commit SHA from release tag $(GH_RELEASE_TAG)"
          exit 1
        }

        # For annotated tags, dereference to get the underlying commit SHA
        if ($tagRef.object.type -eq 'tag') {
          $tagObj = gh api "repos/$(Build.Repository.Name)/git/tags/$sha" | ConvertFrom-Json
          $sha = $tagObj.object.sha
        }

        Write-Host "Creating tag $goModuleTag at commit $sha"

        # Create the lightweight tag via the Git refs API
        gh api "repos/$(Build.Repository.Name)/git/refs" `
          --method POST `
          -f ref="refs/tags/$goModuleTag" `
          -f sha=$sha

        if ($LASTEXITCODE -ne 0) {
          Write-Warning "Failed to create Go module tag $goModuleTag. Checking if the tag was created concurrently..."

          # Re-check for the tag to handle the race where another job created it
          $existingRefs = @(
            gh api "repos/$(Build.Repository.Name)/git/matching-refs/tags/$goModuleTag" |
              ConvertFrom-Json
          )
          $exactMatch = $existingRefs | Where-Object { $_.ref -eq "refs/tags/$goModuleTag" }

          if ($exactMatch) {
            Write-Host "Tag $goModuleTag already exists (likely created by another job). Treating as success."
            exit 0
          }

          Write-Error "Failed to create Go module tag $goModuleTag"
          exit 1
        }

        Write-Host "Successfully created tag: $goModuleTag"
      displayName: Create Go module version tag
      env:
        GH_TOKEN: $(azuresdk-github-pat)

  - ${{ if eq('true', parameters.UploadInstaller) }}:
    - pwsh: |
        Copy-Item installer/install-azd.sh release/
        Copy-Item installer/install-azd-report.sh release/
        Copy-Item installer/uninstall-azd.sh release/
        Copy-Item installer/install-azd.ps1 release/
        Copy-Item installer/uninstall-azd.ps1 release/
      displayName: Copy install scripts to release (PR only)

  - task: AzurePowerShell@5
    displayName: Upload release to storage account
    inputs:
      azureSubscription: 'Azure SDK Artifacts'
      azurePowerShellVersion: LatestVersion
      pwsh: true
      ScriptType: InlineScript
      Inline: |
        $uploadLocations = "${{ parameters.PublishUploadLocations }}" -split ';'

        Get-ChildItem release/
        foreach ($folder in $uploadLocations) {
            Write-Host "Upload to ${{ parameters.StorageContainerName }}/azd/standalone/$folder"
            azcopy copy "release/*" "$(publish-storage-location)/${{ parameters.StorageContainerName }}/azd/standalone/$folder" --overwrite=true
            if ($LASTEXITCODE) {
              Write-Error "Upload failed"
              exit 1
            }
        }
    env:
      AZCOPY_AUTO_LOGIN_TYPE: 'PSCRED'
